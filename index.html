<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hope's Workout Log</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           oklch(97% 0.008 60);
      --surface:      #ffffff;
      --surface-2:    oklch(96% 0.006 58);
      --surface-3:    oklch(93% 0.007 58);
      --text:         oklch(22% 0.01 55);
      --text-muted:   oklch(52% 0.012 55);
      --text-subtle:  oklch(70% 0.008 55);
      --accent:       oklch(62% 0.19 28);
      --accent-d:     oklch(56% 0.19 28);
      --accent-lt:    oklch(95% 0.045 28);
      --sage:         oklch(56% 0.13 162);
      --sage-lt:      oklch(94% 0.04 162);
      --indigo:       oklch(54% 0.17 272);
      --indigo-lt:    oklch(94% 0.04 272);
      --amber:        oklch(68% 0.16 76);
      --amber-lt:     oklch(95% 0.05 76);
      --red:          oklch(55% 0.19 25);
      --red-lt:       oklch(96% 0.04 25);
      --border:       oklch(90% 0.006 58);
      --border-focus: var(--accent);
      --r:            14px;
      --r-sm:         9px;
      --shadow:       0 1px 3px oklch(0% 0 0/.05), 0 4px 14px oklch(0% 0 0/.05);
      --shadow-sm:    0 1px 2px oklch(0% 0 0/.06);
      --font:         'DM Sans', -apple-system, sans-serif;
      --max-w:        500px;
      --nav-h:        64px;
    }

    html { -webkit-tap-highlight-color: transparent; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    #root { min-height: 100dvh; }

    /* ── Shell ─────────────────────────────────────────────────────── */
    .shell {
      max-width: var(--max-w);
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ── Header ────────────────────────────────────────────────────── */
    .app-header {
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-brand { display: flex; align-items: center; gap: 10px; }

    .header-mark {
      width: 34px; height: 34px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .header-mark svg { width: 20px; height: 20px; stroke: white; fill: none; }

    .header-name {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.25px;
    }

    .btn-signout {
      font-family: var(--font);
      font-size: 13px;
      color: var(--text-subtle);
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 7px;
      transition: all .15s;
    }
    .btn-signout:hover { background: var(--surface-2); color: var(--text-muted); }

    /* ── Content ───────────────────────────────────────────────────── */
    .content {
      flex: 1;
      padding: 18px 16px calc(var(--nav-h) + 28px + env(safe-area-inset-bottom));
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* ── Bottom nav ────────────────────────────────────────────────── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: var(--max-w);
      height: calc(var(--nav-h) + env(safe-area-inset-bottom));
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      padding-top: 8px;
      z-index: 10;
    }

    .nav-tab {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      background: none; border: none; cursor: pointer;
      font-family: var(--font); color: var(--text-subtle);
      padding: 6px 0;
      transition: color .15s;
    }
    .nav-tab.active { color: var(--accent); }
    .nav-tab svg { width: 23px; height: 23px; }
    .nav-tab span { font-size: 11px; font-weight: 500; letter-spacing: .03em; }

    /* ── FAB ───────────────────────────────────────────────────────── */
    .fab {
      position: fixed;
      bottom: calc(var(--nav-h) + 14px + env(safe-area-inset-bottom));
      right: 20px;
      width: 54px; height: 54px;
      background: var(--accent);
      color: white;
      border: none; cursor: pointer;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 18px oklch(62% 0.19 28 / 0.38);
      transition: transform .15s, box-shadow .15s;
      z-index: 9;
    }
    .fab:hover { transform: scale(1.06); box-shadow: 0 6px 22px oklch(62% 0.19 28 / 0.46); }
    .fab:active { transform: scale(0.95); }
    .fab svg { width: 24px; height: 24px; }

    @media (min-width: 500px) {
      .fab { right: calc((100vw - 500px) / 2 + 20px); }
    }

    /* ── Date bar ──────────────────────────────────────────────────── */
    .date-bar {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 18px; gap: 12px;
    }
    .date-main { font-size: 22px; font-weight: 600; letter-spacing: -.5px; }
    .date-sub { font-size: 13px; color: var(--text-muted); margin-top: 1px; }

    .date-input {
      background: var(--surface-2);
      border: 1.5px solid transparent;
      border-radius: 8px;
      padding: 7px 10px;
      font-family: var(--font);
      font-size: 13px; color: var(--text-muted);
      cursor: pointer; outline: none;
      -webkit-appearance: none;
      transition: border-color .15s;
    }
    .date-input:focus { border-color: var(--accent); background: var(--surface); }

    /* ── Section label ─────────────────────────────────────────────── */
    .section-label {
      font-size: 11px; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      color: var(--text-subtle);
      margin-bottom: 11px;
    }

    /* ── Activity card ─────────────────────────────────────────────── */
    .act-card {
      background: var(--surface);
      border-radius: var(--r);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      padding: 15px 14px;
      margin-bottom: 10px;
      display: flex; align-items: flex-start; gap: 13px;
    }

    .act-badge {
      width: 42px; height: 42px; border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .act-badge.cycling  { background: var(--sage-lt); }
    .act-badge.weights  { background: var(--accent-lt); }
    .act-badge.gym      { background: var(--indigo-lt); }
    .act-badge.other    { background: var(--amber-lt); }

    .act-body { flex: 1; min-width: 0; }
    .act-type { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text-subtle); margin-bottom: 3px; }
    .act-summary { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 3px; text-wrap: pretty; }
    .act-detail { font-size: 13px; color: var(--text-muted); line-height: 1.5; white-space: pre-line; }

    .act-del {
      width: 32px; height: 32px; border-radius: 8px;
      background: none; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-subtle); flex-shrink: 0;
      transition: all .15s;
    }
    .act-del:hover { background: var(--red-lt); color: var(--red); }
    .act-del svg { width: 16px; height: 16px; }

    /* ── Empty state ───────────────────────────────────────────────── */
    .empty {
      text-align: center; padding: 52px 24px;
      color: var(--text-muted);
    }
    .empty-icon { font-size: 36px; opacity: .35; margin-bottom: 16px; }
    .empty h3 { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .empty p { font-size: 14px; line-height: 1.55; }

    /* ── History ───────────────────────────────────────────────────── */
    .hist-day {
      background: var(--surface);
      border-radius: var(--r);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      margin-bottom: 10px;
      overflow: hidden;
    }
    .hist-day-hd {
      padding: 14px 15px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none;
    }
    .hist-day-date { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .hist-day-meta { font-size: 12px; color: var(--text-muted); }
    .hist-day-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .hist-day-pills { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }

    .pill {
      font-size: 10px; font-weight: 700; letter-spacing: .04em;
      padding: 3px 7px; border-radius: 20px;
    }
    .pill.cycling { background: var(--sage-lt); color: var(--sage); }
    .pill.weights { background: var(--accent-lt); color: var(--accent); }
    .pill.gym     { background: var(--indigo-lt); color: var(--indigo); }
    .pill.other   { background: var(--amber-lt); color: var(--amber); }

    .hist-day-body { border-top: 1px solid var(--border); padding: 10px 15px; }
    .hist-item {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 0;
    }
    .hist-item + .hist-item { border-top: 1px solid var(--border); }
    .hist-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .hist-dot.cycling { background: var(--sage); }
    .hist-dot.weights { background: var(--accent); }
    .hist-dot.gym     { background: var(--indigo); }
    .hist-dot.other   { background: var(--amber); }
    .hist-item-text { font-size: 13.5px; }

    /* ── Sheet ─────────────────────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: oklch(0% 0 0 / .42);
      z-index: 100;
      display: flex; align-items: flex-end; justify-content: center;
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    .sheet {
      width: 100%; max-width: var(--max-w);
      background: var(--surface);
      border-radius: 22px 22px 0 0;
      max-height: 94dvh;
      display: flex; flex-direction: column;
      animation: slideUp .28s cubic-bezier(.32,.72,0,1);
    }
    .sheet-pull { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; flex-shrink: 0; }
    .sheet-hd {
      padding: 14px 18px 14px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sheet-hd h2 { font-size: 16px; font-weight: 600; letter-spacing: -.2px; }
    .sheet-body {
      flex: 1; overflow-y: auto; padding: 18px 18px 4px;
      -webkit-overflow-scrolling: touch;
    }
    .sheet-ft {
      padding: 12px 18px calc(16px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* ── Type grid ─────────────────────────────────────────────────── */
    .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 22px; }
    .type-opt {
      padding: 13px 12px;
      border: 2px solid var(--border);
      border-radius: var(--r);
      background: var(--surface);
      display: flex; align-items: center; gap: 9px;
      cursor: pointer; text-align: left;
      font-family: var(--font);
      transition: all .15s;
    }
    .type-opt:hover { border-color: oklch(80% 0.09 28); }
    .type-opt.sel { border-color: var(--accent); background: var(--accent-lt); }
    .type-opt-icon { font-size: 21px; width: 26px; text-align: center; }
    .type-opt-name { font-size: 14px; font-weight: 600; color: var(--text); }

    /* ── Form fields ───────────────────────────────────────────────── */
    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: 11px; font-weight: 700;
      letter-spacing: .07em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 5px;
    }
    .field input, .field textarea, .field select {
      width: 100%;
      background: var(--surface-2);
      border: 1.5px solid transparent;
      border-radius: var(--r-sm);
      padding: 10px 13px;
      font-family: var(--font); font-size: 15px;
      color: var(--text); outline: none;
      transition: border-color .15s, background .15s;
      -webkit-appearance: none;
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      border-color: var(--accent); background: var(--surface);
    }
    .field input::placeholder, .field textarea::placeholder { color: var(--text-subtle); }
    .field textarea { resize: none; height: 70px; line-height: 1.5; }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

    /* ── Exercises (weights) ───────────────────────────────────────── */
    .ex-block {
      background: var(--surface-2);
      border-radius: 11px;
      padding: 12px;
      margin-bottom: 8px;
    }
    .ex-block-hd {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .ex-num { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text-muted); }
    .ex-remove {
      font-family: var(--font); font-size: 12px; color: var(--text-subtle);
      background: none; border: none; cursor: pointer; padding: 3px 7px; border-radius: 5px;
      transition: all .15s;
    }
    .ex-remove:hover { background: var(--red-lt); color: var(--red); }
    .ex-name { margin-bottom: 8px; }
    .ex-name input {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--r-sm); padding: 9px 12px;
      font-family: var(--font); font-size: 14px; color: var(--text);
      outline: none; width: 100%; transition: border-color .15s;
    }
    .ex-name input:focus { border-color: var(--accent); }
    .ex-name input::placeholder { color: var(--text-subtle); }
    .ex-add-btn {
      width: 100%; padding: 10px;
      border: 2px dashed var(--border); border-radius: 10px;
      background: none; font-family: var(--font);
      font-size: 13px; font-weight: 500;
      color: var(--text-muted); cursor: pointer;
      margin-bottom: 16px; transition: all .15s;
    }
    .ex-add-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Buttons ───────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 12px 20px; border-radius: var(--r-sm);
      font-family: var(--font); font-size: 15px; font-weight: 500;
      cursor: pointer; border: none; transition: all .15s; white-space: nowrap;
    }
    .btn-primary { background: var(--accent); color: white; width: 100%; }
    .btn-primary:hover { background: var(--accent-d); }
    .btn-primary:active { transform: scale(.98); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
    .btn-ghost { background: transparent; color: var(--text-muted); border: 1.5px solid var(--border); }
    .btn-ghost:hover { border-color: var(--text-muted); }
    .btn-dest { background: var(--red); color: white; }
    .btn-dest:hover { background: oklch(50% 0.19 25); }
    .btn-icon {
      width: 34px; height: 34px; padding: 0; border-radius: 50%;
      background: transparent; border: none; color: var(--text-muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background .15s;
    }
    .btn-icon:hover { background: var(--surface-2); }
    .btn-icon svg { width: 20px; height: 20px; }

    /* ── Error msg ─────────────────────────────────────────────────── */
    .err {
      background: var(--red-lt); color: var(--red);
      border-radius: var(--r-sm); padding: 10px 13px;
      font-size: 13px; margin-bottom: 14px; line-height: 1.45;
    }

    /* ── Confirm dialog ────────────────────────────────────────────── */
    .confirm-overlay {
      position: fixed; inset: 0;
      background: oklch(0% 0 0 / .38);
      z-index: 200; display: flex; align-items: center; justify-content: center;
      padding: 24px; animation: fadeIn .15s ease;
    }
    .confirm-card {
      background: var(--surface); border-radius: 18px;
      padding: 28px 22px; width: 100%; max-width: 310px; text-align: center;
    }
    .confirm-card h3 { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
    .confirm-card p { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.5; }
    .confirm-btns { display: flex; gap: 8px; }
    .confirm-btns .btn { flex: 1; }

    /* ── Login ─────────────────────────────────────────────────────── */
    .login-wrap {
      min-height: 100dvh; display: flex;
      align-items: center; justify-content: center;
      padding: 24px; background: var(--bg);
    }
    .login-card {
      width: 100%; max-width: 370px;
      background: var(--surface); border-radius: 22px;
      padding: 38px 30px; border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .login-mark {
      width: 52px; height: 52px; background: var(--accent);
      border-radius: 15px; display: flex; align-items: center; justify-content: center;
      margin-bottom: 22px;
    }
    .login-mark svg { width: 28px; height: 28px; stroke: white; fill: none; }
    .login-card h1 { font-size: 23px; font-weight: 700; letter-spacing: -.5px; margin-bottom: 5px; }
    .login-card .tagline { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; line-height: 1.4; }

    /* ── Loading ───────────────────────────────────────────────────── */
    .loading {
      display: flex; align-items: center; justify-content: center;
      min-height: 180px; color: var(--text-muted); font-size: 14px;
    }

    /* ── Spinner ───────────────────────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2.5px solid oklch(100% 0 0 / .35);
      border-top-color: white;
      animation: spin .7s linear infinite;
      display: inline-block;
    }

    /* ── Chevron ───────────────────────────────────────────────────── */
    .chevron {
      width: 16px; height: 16px; color: var(--text-subtle);
      transition: transform .2s;
    }
    .chevron.open { transform: rotate(90deg); }

    /* ── Exercise progressive toggle ──────────────────────────────── */
    .ex-toggle-row {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 4px 0 8px;
    }
    .ex-toggle-label { font-size: 13px; font-weight: 500; color: var(--text-muted); }

    .toggle-sw {
      position: relative; width: 40px; height: 22px;
      background: var(--border); border: none; border-radius: 11px;
      cursor: pointer; padding: 0; flex-shrink: 0;
      transition: background .2s;
    }
    .toggle-sw.on { background: var(--accent); }
    .toggle-thumb {
      position: absolute; top: 3px; left: 3px;
      width: 16px; height: 16px;
      background: white; border-radius: 50%;
      transition: transform .2s; display: block;
    }
    .toggle-sw.on .toggle-thumb { transform: translateX(18px); }

    /* ── Set groups ────────────────────────────────────────────────── */
    .ex-set-groups { margin-bottom: 6px; }
    .set-group {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px; margin-bottom: 6px;
    }
    .set-group-hd {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 6px;
    }
    .ex-sg-add {
      width: 100%; padding: 7px;
      border: 1.5px dashed var(--border); border-radius: 7px;
      background: none; font-family: var(--font);
      font-size: 12px; font-weight: 500;
      color: var(--text-subtle); cursor: pointer;
      margin-bottom: 8px; transition: all .15s;
    }
    .ex-sg-add:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Desktop sidebar (hidden on mobile) ────────────────────────── */
    .desktop-sidebar { display: none; }

    /* ════════════════════════════════════════════════════════════════
       DESKTOP / TABLET  ≥ 640px
    ════════════════════════════════════════════════════════════════ */
    @media (min-width: 640px) {

      /* Allow user to zoom/scroll on desktop */
      html { overflow-y: auto; }

      body { background: var(--bg); display: flex; justify-content: center; }

      #root { width: 100%; }

      /* ── Shell becomes a horizontal split ── */
      .shell {
        flex-direction: row;
        max-width: 1100px;
        margin: 0 auto;
        min-height: 100dvh;
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
        background: var(--surface);
      }

      /* ── Hide mobile-only chrome ── */
      .app-header  { display: none; }
      .bottom-nav  { display: none; }
      .fab         { display: none; }

      /* ── Desktop sidebar ── */
      .desktop-sidebar {
        display: flex;
        flex-direction: column;
        width: 220px;
        flex-shrink: 0;
        border-right: 1px solid var(--border);
        background: var(--surface);
        padding: 28px 16px 24px;
        position: sticky;
        top: 0;
        height: 100dvh;
        overflow-y: auto;
      }

      .sb-brand {
        display: flex; align-items: center; gap: 10px;
        padding: 0 4px;
        margin-bottom: 32px;
      }
      .sb-mark {
        width: 36px; height: 36px; background: var(--accent);
        border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
      }
      .sb-mark svg { width: 20px; height: 20px; stroke: white; fill: none; }
      .sb-name { font-size: 14px; font-weight: 700; letter-spacing: -.3px; line-height: 1.3; }

      .sb-nav { flex: 1; display: flex; flex-direction: column; gap: 2px; }

      .sb-tab {
        display: flex; align-items: center; gap: 9px;
        padding: 9px 10px; border-radius: 9px;
        background: none; border: none; cursor: pointer;
        font-family: var(--font); font-size: 14px; font-weight: 500;
        color: var(--text-muted); width: 100%; text-align: left;
        transition: all .15s;
      }
      .sb-tab svg { width: 19px; height: 19px; flex-shrink: 0; }
      .sb-tab:hover  { background: var(--surface-2); color: var(--text); }
      .sb-tab.active { background: var(--accent-lt); color: var(--accent); }

      .sb-add {
        display: flex; align-items: center; justify-content: center; gap: 7px;
        width: 100%; padding: 10px 14px; margin-top: 14px;
        background: var(--accent); color: white;
        border: none; border-radius: 9px; cursor: pointer;
        font-family: var(--font); font-size: 14px; font-weight: 600;
        transition: background .15s;
      }
      .sb-add:hover { background: var(--accent-d); }
      .sb-add svg { width: 17px; height: 17px; }

      .sb-bottom { margin-top: 16px; }
      .sb-signout {
        font-family: var(--font); font-size: 13px;
        color: var(--text-subtle);
        background: none; border: none; cursor: pointer;
        padding: 7px 10px; border-radius: 8px; width: 100%; text-align: left;
        transition: all .15s;
      }
      .sb-signout:hover { background: var(--surface-2); color: var(--text-muted); }

      /* ── Content area ── */
      .content {
        flex: 1;
        padding: 36px 40px 48px;
        background: var(--bg);
        max-width: 780px;
        overflow-y: auto;
        height: 100dvh;
      }

      /* ── Bigger date heading ── */
      .date-main { font-size: 26px; letter-spacing: -.6px; }

      /* ── Sheet → centered dialog on desktop ── */
      .overlay { align-items: center; }
      .sheet {
        border-radius: 20px;
        max-width: 500px;
        max-height: 88dvh;
        margin: 0 auto;
        width: calc(100% - 48px);
        animation: modalIn .22s cubic-bezier(.34,1.4,.64,1);
      }
      .sheet-pull { display: none; }

      @keyframes modalIn {
        from { opacity: 0; transform: scale(.96) translateY(6px); }
        to   { opacity: 1; transform: scale(1)   translateY(0);   }
      }

      /* ── Slightly larger cards on desktop ── */
      .act-card { padding: 18px 16px; gap: 15px; }
      .act-badge { width: 46px; height: 46px; font-size: 22px; }

      /* ── History: two columns on wide desktop ── */
      @media (min-width: 1024px) {
        .shell { max-width: 1200px; }
        .desktop-sidebar { width: 240px; }
        .content { padding: 40px 56px 56px; max-width: none; }
      }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useCallback, useRef } = React;

  /* ╔══════════════════════════════════════════════════════════════════╗
     ║  CONFIGURATION — replace these two values with your own project  ║
     ║  Settings → API in the Supabase dashboard                        ║
     ╚══════════════════════════════════════════════════════════════════╝ */
  const SUPABASE_URL      = 'https://qqnrjxwuyqiteambaiev.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_ogXay9KGeHpKRhHLXgzAlw_FJ_ADGnI';
  /* ═══════════════════════════════════════════════════════════════════ */

  const IS_CONFIGURED = SUPABASE_URL.startsWith('http');
  const sb = IS_CONFIGURED
    ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    : null;

  /* ── Utils ───────────────────────────────────────────────────────────── */
  const todayStr = () => new Date().toISOString().split('T')[0];

  const fmtDate = (s) => {
    const [y, m, d] = s.split('-').map(Number);
    const dt = new Date(y, m - 1, d);
    const t  = new Date(); const yd = new Date(); yd.setDate(t.getDate() - 1);
    if (dt.toDateString() === t.toDateString())  return 'Today';
    if (dt.toDateString() === yd.toDateString()) return 'Yesterday';
    return dt.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
  };

  const fmtShort = (s) => {
    const [y, m, d] = s.split('-').map(Number);
    return new Date(y, m - 1, d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
  };

  const toTitleCase = (s) => (s || '').split(' ').map(w => w ? w[0].toUpperCase() + w.slice(1).toLowerCase() : '').join(' ');

  const META = {
    cycling: { label: 'Cycling',   emoji: '🚴', cls: 'cycling' },
    weights: { label: 'Weights',   emoji: '🏋️', cls: 'weights' },
    gym:     { label: 'Gym cardio',emoji: '🏃', cls: 'gym'     },
    other:   { label: 'Other',     emoji: '✨', cls: 'other'   },
  };

  const summarize = (type, data) => {
    if (!data) return '';
    if (type === 'cycling') {
      const ps = [data.duration && `${data.duration} min`, data.distance && `${data.distance} km`].filter(Boolean);
      return ps.join(' · ') || 'Cycling session';
    }
    if (type === 'weights') {
      const ex = data.exercises || [];
      if (ex.length === 0) return 'Weights session';
      if (ex.length === 1) return ex[0].name || '1 exercise';
      return `${ex.length} exercises`;
    }
    if (type === 'gym') {
      const ps = [data.machine, data.duration && `${data.duration} min`].filter(Boolean);
      return ps.join(' · ') || 'Gym cardio';
    }
    if (type === 'other') return data.name || 'Activity';
    return '';
  };

  const getDetail = (type, data) => {
    if (!data) return null;
    if (type === 'cycling') return data.notes || null;
    if (type === 'gym')     return data.notes || null;
    if (type === 'other') {
      const ps = [data.duration && `${data.duration} min`, data.notes].filter(Boolean);
      return ps.join(' · ') || null;
    }
    if (type === 'weights') {
      const ex = (data.exercises || []).slice(0, 4);
      if (!ex.length) return null;
      return ex.map(e => {
        const name = e.name || 'Exercise';
        // Old flat structure: { name, weight, sets, reps }
        if ('sets' in e || 'reps' in e) {
          let s = name;
          if (e.weight) s += ` — ${e.weight} kg`;
          if (e.sets && e.reps) s += ` · ${e.sets}×${e.reps}`;
          return s;
        }
        // New structure: { name, progressiveWeight, weight?, setGroups }
        const sgs = e.setGroups || [];
        if (!sgs.length) return name;
        const exMode = e.mode || 'reps';
        const fmtSg = (sg) => {
          if (exMode === 'duration') {
            const unit = sg.unit || 'seconds';
            const suffix = unit === 'minutes' ? 'min' : 's';
            return `${sg.sets || '?'}×${sg.duration || '?'}${suffix}`;
          }
          return `${sg.sets || '?'}×${sg.reps || '?'}`;
        };
        if (e.progressiveWeight) {
          const parts = sgs.map(sg => {
            let p = fmtSg(sg);
            if (sg.weight) p += ` @ ${sg.weight}kg`;
            return p;
          });
          return `${name} — ${parts.join(' → ')}`;
        } else {
          const parts = sgs.map(fmtSg).join(', ');
          let s = `${name} — ${parts}`;
          if (e.weight) s += ` @ ${e.weight}kg`;
          return s;
        }
      }).join('\n');
    }
    return null;
  };

  /* ── SVG Icons ───────────────────────────────────────────────────────── */
  const IPlus   = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>;
  const IClose  = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>;
  const ITrash  = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>;
  const IChev   = ({ open }) => <svg className={`chevron ${open ? 'open' : ''}`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18l6-6-6-6"/></svg>;
  const IPencil = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;

  const IDumbbell = () => (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M6 4h2v16H6zM16 4h2v16h-2z"/>
      <path d="M4 7h4M4 17h4M16 7h4M16 17h4M8 12h8"/>
    </svg>
  );

  const ICalendar = () => (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <rect x="3" y="4" width="18" height="18" rx="3"/>
      <path d="M16 2v4M8 2v4M3 10h18"/>
    </svg>
  );

  const IHistory = () => (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M3 3v6h6M21 12A9 9 0 0 0 6 5.3L3 8M12 7v5l4 2"/>
    </svg>
  );

  /* ── Forms ───────────────────────────────────────────────────────────── */
  function CyclingForm({ val, set }) {
    const u = (k, v) => set({ ...val, [k]: v });
    return <>
      <div className="row-2">
        <div className="field">
          <label>Duration (min) *</label>
          <input type="number" min="1" placeholder="45" value={val.duration || ''} onChange={e => u('duration', e.target.value)} />
        </div>
        <div className="field">
          <label>Distance (km)</label>
          <input type="number" min="0" step="0.1" placeholder="20" value={val.distance || ''} onChange={e => u('distance', e.target.value)} />
        </div>
      </div>
      <div className="field">
        <label>Notes</label>
        <textarea placeholder="e.g. outdoor ride, Peloton, Zone 2…" value={val.notes || ''} onChange={e => u('notes', e.target.value)} />
      </div>
    </>;
  }

  function ExerciseNameInput({ value, onChange, pastNames, pastRows }) {
    const [open,       setOpen]       = useState(false);
    const [activeIdx,  setActiveIdx]  = useState(-1);
    const [suggestion, setSuggestion] = useState(null);
    const [histPrompt, setHistPrompt] = useState(null);
    const [updating,   setUpdating]   = useState(false);
    const wrapRef    = useRef(null);
    const ignoredRef = useRef(null);

    const normName = (s) => (s || '').toLowerCase().replace(/[\s\W_]+/g, '');

    const lv = value.toLowerCase();
    const filtered = !value.trim()
      ? pastNames
      : pastNames.filter(n => n.toLowerCase().includes(lv) && n.toLowerCase() !== lv);

    useEffect(() => {
      if (!value.trim() || value.trim().length < 2 || !pastNames.length) { setSuggestion(null); return; }
      const normTyped = normName(value);
      if (normTyped === ignoredRef.current) { setSuggestion(null); return; }
      const match = pastNames.find(n => normName(n) === normTyped && n !== value);
      setSuggestion(match ? { matched: match } : null);
    }, [value, pastNames]);

    useEffect(() => {
      const handler = (e) => {
        if (wrapRef.current && !wrapRef.current.contains(e.target)) { setOpen(false); setActiveIdx(-1); }
      };
      document.addEventListener('mousedown', handler);
      return () => document.removeEventListener('mousedown', handler);
    }, []);

    const select = (name) => {
      onChange(name); setOpen(false); setActiveIdx(-1); setSuggestion(null); ignoredRef.current = null;
    };

    const handleKeyDown = (e) => {
      if (e.key === 'Escape') { setOpen(false); setActiveIdx(-1); return; }
      if (!open || !filtered.length) return;
      if (e.key === 'ArrowDown') { e.preventDefault(); setActiveIdx(i => Math.min(i + 1, filtered.length - 1)); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); setActiveIdx(i => Math.max(i - 1, 0)); }
      else if (e.key === 'Enter' && activeIdx >= 0) { e.preventDefault(); select(filtered[activeIdx]); }
    };

    const handleUseSuggestion = () => {
      if (!suggestion) return;
      const matched   = suggestion.matched;
      const normTyped = normName(value);
      onChange(matched); setSuggestion(null); setOpen(false); ignoredRef.current = null;
      const rowsToFix = (pastRows || []).filter(row => {
        const exs = (row.data && row.data.exercises) || [];
        return exs.some(e => e.name && normName(e.name) === normTyped && e.name !== matched);
      });
      if (rowsToFix.length > 0) {
        const totalOcc = rowsToFix.reduce((acc, row) => {
          const exs = (row.data && row.data.exercises) || [];
          return acc + exs.filter(e => e.name && normName(e.name) === normTyped && e.name !== matched).length;
        }, 0);
        setHistPrompt({ typed: value, matched, normTyped, rowsToFix, totalOcc });
      }
    };

    const handleUpdateAll = async () => {
      if (!histPrompt) return;
      setUpdating(true);
      const { matched, normTyped, rowsToFix } = histPrompt;
      for (const row of rowsToFix) {
        const newExs = ((row.data && row.data.exercises) || []).map(e =>
          (e.name && normName(e.name) === normTyped && e.name !== matched) ? { ...e, name: matched } : e
        );
        await sb.from('workouts').update({ data: { ...row.data, exercises: newExs } }).eq('id', row.id);
      }
      setUpdating(false); setHistPrompt(null);
    };

    return (
      <div ref={wrapRef} style={{ position: 'relative' }}>
        <input
          type="text"
          placeholder="Exercise name (e.g. Squat, Bench press…)"
          value={value}
          onChange={e => { onChange(e.target.value); setOpen(true); setActiveIdx(-1); setHistPrompt(null); ignoredRef.current = null; }}
          onFocus={() => setOpen(true)}
          onKeyDown={handleKeyDown}
        />

        {open && filtered.length > 0 && (
          <div style={{
            position: 'absolute', top: '100%', left: 0, right: 0, zIndex: 50,
            background: 'var(--surface)', border: '1.5px solid var(--border)',
            borderRadius: 'var(--r-sm)', boxShadow: 'var(--shadow)',
            maxHeight: 180, overflowY: 'auto', marginTop: 3,
          }}>
            {filtered.map((n, idx) => (
              <div key={n}
                onMouseDown={e => { e.preventDefault(); select(n); }}
                style={{
                  padding: '9px 12px', fontSize: 14, cursor: 'pointer',
                  background: idx === activeIdx ? 'var(--accent-lt)' : 'transparent',
                  color: idx === activeIdx ? 'var(--accent)' : 'var(--text)',
                  borderBottom: idx < filtered.length - 1 ? '1px solid var(--border)' : 'none',
                }}
              >{n}</div>
            ))}
          </div>
        )}

        {suggestion && !histPrompt && (
          <div style={{
            marginTop: 5, padding: '7px 10px', background: 'var(--amber-lt)',
            borderRadius: 7, fontSize: 13, display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap',
          }}>
            <span style={{ color: 'var(--text-muted)', flex: 1, minWidth: 0 }}>
              Did you mean <strong style={{ color: 'var(--text)' }}>"{suggestion.matched}"</strong>?
            </span>
            <button type="button"
              onMouseDown={e => { e.preventDefault(); handleUseSuggestion(); }}
              style={{ fontFamily: 'var(--font)', fontSize: 12, fontWeight: 600, padding: '3px 9px', borderRadius: 5, border: 'none', cursor: 'pointer', background: 'var(--amber)', color: 'white', flexShrink: 0 }}>
              Use this
            </button>
            <button type="button"
              onMouseDown={e => { e.preventDefault(); ignoredRef.current = normName(value); setSuggestion(null); }}
              style={{ fontFamily: 'var(--font)', fontSize: 12, fontWeight: 500, padding: '3px 9px', borderRadius: 5, border: '1px solid var(--border)', cursor: 'pointer', background: 'var(--surface)', color: 'var(--text-muted)', flexShrink: 0 }}>
              Keep typing
            </button>
          </div>
        )}

        {histPrompt && (
          <div style={{ marginTop: 5, padding: '8px 10px', background: 'var(--indigo-lt)', borderRadius: 7, fontSize: 13 }}>
            <p style={{ color: 'var(--text-muted)', marginBottom: 7, lineHeight: 1.45 }}>
              <strong style={{ color: 'var(--text)' }}>"{histPrompt.typed}"</strong>{' '}
              found in {histPrompt.totalOcc} past {histPrompt.totalOcc === 1 ? 'entry' : 'entries'} — update all to{' '}
              <strong style={{ color: 'var(--text)' }}>"{histPrompt.matched}"</strong>?
            </p>
            <div style={{ display: 'flex', gap: 6 }}>
              <button type="button" onClick={handleUpdateAll} disabled={updating}
                style={{ fontFamily: 'var(--font)', fontSize: 12, fontWeight: 600, padding: '4px 10px', borderRadius: 5, border: 'none', cursor: updating ? 'not-allowed' : 'pointer', background: 'var(--indigo)', color: 'white', opacity: updating ? 0.7 : 1 }}>
                {updating ? 'Updating…' : 'Update all'}
              </button>
              <button type="button" onClick={() => setHistPrompt(null)} disabled={updating}
                style={{ fontFamily: 'var(--font)', fontSize: 12, fontWeight: 500, padding: '4px 10px', borderRadius: 5, border: '1px solid var(--border)', cursor: updating ? 'not-allowed' : 'pointer', background: 'var(--surface)', color: 'var(--text-muted)' }}>
                Skip
              </button>
            </div>
          </div>
        )}
      </div>
    );
  }

  function WeightsForm({ val, set, pastNames, pastRows }) {
    const defaultEx = () => ({ name: '', progressiveWeight: false, weight: '', mode: 'reps', setGroups: [{ sets: '', reps: '' }] });
    const defaultSg = (prog, mode) => {
      const base = (mode === 'duration')
        ? { sets: '', duration: '', unit: 'seconds' }
        : { sets: '', reps: '' };
      return prog ? { ...base, weight: '' } : base;
    };

    const exs = val.exercises || [defaultEx()];

    const updEx = (i, changes) => {
      const next = exs.map((e, idx) => idx === i ? { ...e, ...changes } : e);
      set({ ...val, exercises: next });
    };
    const addEx = () => set({ ...val, exercises: [...exs, defaultEx()] });
    const remEx = (i) => set({ ...val, exercises: exs.filter((_, idx) => idx !== i) });

    const addSg = (i) => {
      const ex = exs[i];
      updEx(i, { setGroups: [...ex.setGroups, defaultSg(ex.progressiveWeight, ex.mode || 'reps')] });
    };
    const remSg = (i, j) => {
      updEx(i, { setGroups: exs[i].setGroups.filter((_, idx) => idx !== j) });
    };
    const updSg = (i, j, k, v) => {
      const nextSgs = exs[i].setGroups.map((sg, idx) => idx === j ? { ...sg, [k]: v } : sg);
      updEx(i, { setGroups: nextSgs });
    };

    const toggleProgressive = (i) => {
      const ex = exs[i];
      const newProg = !ex.progressiveWeight;
      let newSgs;
      if (newProg) {
        newSgs = ex.setGroups.map(sg => ({ ...sg, weight: '' }));
      } else {
        newSgs = ex.setGroups.map(({ weight, ...rest }) => rest);
      }
      updEx(i, { progressiveWeight: newProg, weight: '', setGroups: newSgs });
    };

    const toggleMode = (i) => {
      const ex = exs[i];
      const newMode = (ex.mode || 'reps') === 'duration' ? 'reps' : 'duration';
      const newSgs = ex.setGroups.map(sg => {
        const { reps, duration, unit, ...base } = sg;
        return newMode === 'duration'
          ? { ...base, duration: '', unit: 'seconds' }
          : { ...base, reps: '' };
      });
      updEx(i, { mode: newMode, setGroups: newSgs });
    };

    return <>
      {exs.map((ex, i) => {
        const mode = ex.mode || 'reps';
        const isDuration = mode === 'duration';
        return (
          <div key={i} className="ex-block">
            <div className="ex-block-hd">
              <span className="ex-num">Exercise {i + 1}</span>
              {exs.length > 1 && <button className="ex-remove" type="button" onClick={() => remEx(i)}>Remove</button>}
            </div>
            <div className="ex-name">
              <ExerciseNameInput
                value={ex.name}
                onChange={v => updEx(i, { name: v })}
                pastNames={pastNames || []}
                pastRows={pastRows || []}
              />
            </div>

            {/* Mode toggle */}
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '4px 0 8px' }}>
              <span style={{ fontSize: 13, fontWeight: 500, color: 'var(--text-muted)' }}>Mode</span>
              <div style={{ display: 'flex', background: 'var(--surface-3)', borderRadius: 7, padding: 2 }}>
                {['reps', 'duration'].map(m => (
                  <button key={m} type="button" onClick={() => mode !== m && toggleMode(i)} style={{
                    fontFamily: 'var(--font)', fontSize: 12, fontWeight: 600,
                    padding: '4px 10px', borderRadius: 5, border: 'none', cursor: 'pointer',
                    background: mode === m ? 'var(--surface)' : 'transparent',
                    color: mode === m ? 'var(--text)' : 'var(--text-subtle)',
                    boxShadow: mode === m ? 'var(--shadow-sm)' : 'none',
                    transition: 'all .15s', textTransform: 'capitalize',
                  }}>{m}</button>
                ))}
              </div>
            </div>

            {/* Progressive weight toggle */}
            <div className="ex-toggle-row">
              <span className="ex-toggle-label">Progressive weight</span>
              <button type="button" className={`toggle-sw ${ex.progressiveWeight ? 'on' : ''}`} onClick={() => toggleProgressive(i)} aria-pressed={ex.progressiveWeight}>
                <span className="toggle-thumb" />
              </button>
            </div>

            {!ex.progressiveWeight && (
              <div className="field" style={{ marginBottom: 8 }}>
                <label>Weight (kg)</label>
                <input type="number" min="0" step="0.5" placeholder="60" value={ex.weight || ''} onChange={e => updEx(i, { weight: e.target.value })} />
              </div>
            )}

            <div className="ex-set-groups">
              {ex.setGroups.map((sg, j) => (
                <div key={j} className="set-group">
                  <div className="set-group-hd">
                    <span className="ex-num">Group {j + 1}</span>
                    {ex.setGroups.length > 1 && (
                      <button type="button" className="ex-remove" onClick={() => remSg(i, j)}>Remove</button>
                    )}
                  </div>
                  <div className={ex.progressiveWeight ? 'row-3' : 'row-2'}>
                    <div className="field">
                      <label>Sets</label>
                      <input type="number" min="1" placeholder="3" value={sg.sets} onChange={e => updSg(i, j, 'sets', e.target.value)} />
                    </div>
                    {isDuration ? (
                      <div className="field">
                        <label>Duration</label>
                        <div style={{ display: 'flex', gap: 6 }}>
                          <input type="number" min="1" placeholder="30" value={sg.duration || ''} onChange={e => updSg(i, j, 'duration', e.target.value)} style={{ flex: 1, width: 'auto' }} />
                          <select value={sg.unit || 'seconds'} onChange={e => updSg(i, j, 'unit', e.target.value)} style={{ width: 90, flexShrink: 0 }}>
                            <option value="seconds">seconds</option>
                            <option value="minutes">minutes</option>
                          </select>
                        </div>
                      </div>
                    ) : (
                      <div className="field">
                        <label>Reps</label>
                        <input type="number" min="1" placeholder="10" value={sg.reps || ''} onChange={e => updSg(i, j, 'reps', e.target.value)} />
                      </div>
                    )}
                    {ex.progressiveWeight && (
                      <div className="field">
                        <label>Weight (kg)</label>
                        <input type="number" min="0" step="0.5" placeholder="60" value={sg.weight || ''} onChange={e => updSg(i, j, 'weight', e.target.value)} />
                      </div>
                    )}
                  </div>
                </div>
              ))}
            </div>

            <button type="button" className="ex-sg-add" onClick={() => addSg(i)}>+ Add set group</button>
          </div>
        );
      })}
      <button type="button" className="ex-add-btn" onClick={addEx}>+ Add another exercise</button>
    </>;
  }

  function GymForm({ val, set }) {
    const u = (k, v) => set({ ...val, [k]: v });
    return <>
      <div className="row-2">
        <div className="field">
          <label>Duration (min) *</label>
          <input type="number" min="1" placeholder="30" value={val.duration || ''} onChange={e => u('duration', e.target.value)} />
        </div>
        <div className="field">
          <label>Machine / type</label>
          <input type="text" placeholder="treadmill, rower…" value={val.machine || ''} onChange={e => u('machine', e.target.value)} />
        </div>
      </div>
      <div className="field">
        <label>Notes</label>
        <textarea placeholder="Anything else to note…" value={val.notes || ''} onChange={e => u('notes', e.target.value)} />
      </div>
    </>;
  }

  function OtherForm({ val, set }) {
    const u = (k, v) => set({ ...val, [k]: v });
    return <>
      <div className="field">
        <label>Activity name *</label>
        <input type="text" placeholder="e.g. Yoga, Swimming, Pilates…" value={val.name || ''} onChange={e => u('name', e.target.value)} />
      </div>
      <div className="field">
        <label>Duration (min)</label>
        <input type="number" min="1" placeholder="60" value={val.duration || ''} onChange={e => u('duration', e.target.value)} />
      </div>
      <div className="field">
        <label>Notes</label>
        <textarea placeholder="Any notes…" value={val.notes || ''} onChange={e => u('notes', e.target.value)} />
      </div>
    </>;
  }

  /* ── Add Sheet ───────────────────────────────────────────────────────── */
  function AddSheet({ date, onClose, onSaved, existing }) {
    const [type, setType]           = useState(existing ? existing.type : 'cycling');
    const [form, setForm]           = useState(existing ? (existing.data || {}) : {});
    const [saving, setSave]         = useState(false);
    const [err, setErr]             = useState('');
    const [pastNames, setPastNames] = useState([]);
    const [pastRows,  setPastRows]  = useState([]);

    useEffect(() => {
      (async () => {
        const { data: { user } } = await sb.auth.getUser();
        const { data } = await sb.from('workouts').select('id, data').eq('user_id', user.id).eq('type', 'weights');
        if (!data) return;
        const names = [...new Set(
          data.flatMap(row => ((row.data && row.data.exercises) || []).map(e => e.name).filter(Boolean).map(toTitleCase))
        )].sort((a, b) => a.localeCompare(b));
        setPastNames(names);
        setPastRows(data);
      })();
    }, []);

    const changeType = (t) => { setType(t); setForm({}); setErr(''); };

    const validate = () => {
      if (type === 'cycling' && !form.duration) return 'Duration is required for cycling.';
      if (type === 'weights') {
        const ex = form.exercises || [];
        if (!ex.length || !ex[0].name.trim()) return 'Add at least one exercise with a name.';
        for (const e of ex) {
          const sgs = e.setGroups || [];
          const exMode = e.mode || 'reps';
          for (const sg of sgs) {
            if (exMode === 'duration') {
              if (!sg.sets || !sg.duration) return 'Each set group needs sets and duration filled in.';
            } else {
              if (!sg.sets || !sg.reps) return 'Each set group needs sets and reps filled in.';
            }
          }
        }
      }
      if (type === 'gym' && !form.duration) return 'Duration is required for gym cardio.';
      if (type === 'other' && !form.name?.trim()) return 'Activity name is required.';
      return null;
    };

    const save = async () => {
      const e = validate();
      if (e) { setErr(e); return; }
      setSave(true); setErr('');
      const { data: { user } } = await sb.auth.getUser();
      const formToSave = type === 'weights'
        ? { ...form, exercises: (form.exercises || []).map(ex => ({ ...ex, name: toTitleCase(ex.name || '') })) }
        : form;
      let dbErr;
      if (existing) {
        ({ error: dbErr } = await sb.from('workouts')
          .update({ type, data: formToSave })
          .eq('id', existing.id)
          .eq('user_id', user.id));
      } else {
        ({ error: dbErr } = await sb.from('workouts').insert({
          user_id: user.id, date, type, data: formToSave,
        }));
      }
      setSave(false);
      if (dbErr) { setErr(dbErr.message); return; }
      onSaved();
    };

    const TYPES = [
      { id: 'cycling', label: 'Cycling',    emoji: '🚴' },
      { id: 'weights', label: 'Weights',    emoji: '🏋️' },
      { id: 'gym',     label: 'Gym cardio', emoji: '🏃' },
      { id: 'other',   label: 'Other',      emoji: '✨' },
    ];

    return (
      <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>
        <div className="sheet">
          <div className="sheet-pull" />
          <div className="sheet-hd">
            <h2>{existing ? 'Edit activity' : 'Log activity'} · {fmtDate(date)}</h2>
            <button className="btn-icon" onClick={onClose}><IClose /></button>
          </div>
          <div className="sheet-body">
            {err && <div className="err">{err}</div>}
            {!existing && (
              <>
                <div className="section-label" style={{ marginBottom: 10 }}>Activity type</div>
                <div className="type-grid">
                  {TYPES.map(t => (
                    <button key={t.id} type="button" className={`type-opt ${type === t.id ? 'sel' : ''}`} onClick={() => changeType(t.id)}>
                      <span className="type-opt-icon">{t.emoji}</span>
                      <span className="type-opt-name">{t.label}</span>
                    </button>
                  ))}
                </div>
              </>
            )}
            <div className="section-label" style={{ marginBottom: 14 }}>Details</div>
            {type === 'cycling' && <CyclingForm val={form} set={setForm} />}
            {type === 'weights' && <WeightsForm val={form} set={setForm} pastNames={pastNames} pastRows={pastRows} />}
            {type === 'gym'     && <GymForm     val={form} set={setForm} />}
            {type === 'other'   && <OtherForm   val={form} set={setForm} />}
          </div>
          <div className="sheet-ft">
            <button className="btn btn-primary" onClick={save} disabled={saving}>
              {saving ? <><span className="spinner" /> Saving…</> : 'Save activity'}
            </button>
          </div>
        </div>
      </div>
    );
  }

  /* ── Confirm Delete ──────────────────────────────────────────────────── */
  function ConfirmDelete({ onConfirm, onCancel }) {
    return (
      <div className="confirm-overlay">
        <div className="confirm-card">
          <h3>Remove this entry?</h3>
          <p>This action can't be undone. The activity will be permanently deleted.</p>
          <div className="confirm-btns">
            <button className="btn btn-ghost" onClick={onCancel}>Cancel</button>
            <button className="btn btn-dest"  onClick={onConfirm}>Delete</button>
          </div>
        </div>
      </div>
    );
  }

  /* ── Activity Card ───────────────────────────────────────────────────── */
  function ActivityCard({ w, onDelete, onEdit }) {
    const meta = META[w.type];
    const sum  = summarize(w.type, w.data);
    const det  = getDetail(w.type, w.data);
    return (
      <div className="act-card">
        <div className={`act-badge ${meta.cls}`}>{meta.emoji}</div>
        <div className="act-body">
          <div className="act-type">{meta.label}</div>
          <div className="act-summary">{sum}</div>
          {det && <div className="act-detail">{det}</div>}
        </div>
        <button className="act-del" title="Edit" onClick={() => onEdit(w)}>
          <IPencil />
        </button>
        <button className="act-del" title="Delete" onClick={() => onDelete(w.id)}>
          <ITrash />
        </button>
      </div>
    );
  }

  /* ── Day View ────────────────────────────────────────────────────────── */
  function DayView({ user, showAdd, setShowAdd }) {
    const [date,     setDate]    = useState(todayStr);
    const [items,    setItems]   = useState([]);
    const [loading,  setLoading] = useState(true);
    const [delId,    setDelId]   = useState(null);
    const [editItem, setEditItem] = useState(null);

    const load = useCallback(async () => {
      setLoading(true);
      const { data } = await sb.from('workouts')
        .select('*').eq('user_id', user.id).eq('date', date)
        .order('created_at', { ascending: true });
      setItems(data || []);
      setLoading(false);
    }, [date, user.id]);

    useEffect(() => { load(); }, [load]);

    const doDelete = async () => {
      await sb.from('workouts').delete().eq('id', delId);
      setDelId(null); load();
    };

    const isToday = date === todayStr();

    return (
      <div>
        {/* Date bar */}
        <div className="date-bar">
          <div>
            <div className="date-main">{fmtDate(date)}</div>
            {!isToday && <div className="date-sub">{fmtShort(date)}</div>}
          </div>
          <input type="date" className="date-input"
            value={date} max={todayStr()}
            onChange={e => e.target.value && setDate(e.target.value)} />
        </div>

        {loading ? (
          <div className="loading">Loading…</div>
        ) : items.length === 0 ? (
          <div className="empty">
            <div className="empty-icon">🌿</div>
            <h3>{isToday ? 'Nothing logged yet today' : 'No activities this day'}</h3>
            <p>{isToday ? 'Tap the + button to log your first activity.' : 'No activities were logged on this date.'}</p>
          </div>
        ) : (
          <>
            <div className="section-label">{items.length} {items.length === 1 ? 'activity' : 'activities'}</div>
            {items.map(w => <ActivityCard key={w.id} w={w} onDelete={setDelId} onEdit={setEditItem} />)}
          </>
        )}

        {/* FAB — mobile only (desktop uses sidebar button) */}
        <button className="fab" onClick={() => setShowAdd(true)} title="Log activity">
          <IPlus />
        </button>

        {showAdd   && <AddSheet date={date} onClose={() => setShowAdd(false)} onSaved={() => { setShowAdd(false); load(); }} />}
        {editItem  && <AddSheet date={editItem.date} existing={editItem} onClose={() => setEditItem(null)} onSaved={() => { setEditItem(null); load(); }} />}
        {delId     && <ConfirmDelete onConfirm={doDelete} onCancel={() => setDelId(null)} />}
      </div>
    );
  }

  /* ── History View ────────────────────────────────────────────────────── */
  function HistoryView({ user }) {
    const [items,    setItems]   = useState([]);
    const [loading,  setLoading] = useState(true);
    const [open,     setOpen]    = useState({});
    const [editItem, setEditItem] = useState(null);

    const load = useCallback(async () => {
      const { data } = await sb.from('workouts')
        .select('*').eq('user_id', user.id)
        .order('date', { ascending: false })
        .order('created_at', { ascending: true });
      setItems(data || []);
    }, [user.id]);

    useEffect(() => {
      (async () => { await load(); setLoading(false); })();
    }, [load]);

    const grouped = items.reduce((acc, w) => {
      (acc[w.date] = acc[w.date] || []).push(w);
      return acc;
    }, {});
    const days = Object.keys(grouped).sort((a, b) => b.localeCompare(a));

    if (loading) return <div className="loading">Loading history…</div>;

    if (!days.length) return (
      <div className="empty">
        <div className="empty-icon">📋</div>
        <h3>No history yet</h3>
        <p>Your past workouts will appear here once you start logging.</p>
      </div>
    );

    const toggle = (d) => setOpen(o => ({ ...o, [d]: !o[d] }));

    return (
      <>
        <div className="section-label">{days.length} days logged</div>
        {days.map(day => {
          const ws     = grouped[day];
          const isOpen = open[day];
          const types  = [...new Set(ws.map(w => w.type))];
          return (
            <div key={day} className="hist-day">
              <div className="hist-day-hd" onClick={() => toggle(day)}>
                <div>
                  <div className="hist-day-date">{fmtDate(day)}</div>
                  <div className="hist-day-meta">{fmtShort(day)} · {ws.length} {ws.length === 1 ? 'activity' : 'activities'}</div>
                </div>
                <div className="hist-day-right">
                  <div className="hist-day-pills">
                    {types.map(t => <span key={t} className={`pill ${t}`}>{META[t].label}</span>)}
                  </div>
                  <IChev open={isOpen} />
                </div>
              </div>
              {isOpen && (
                <div className="hist-day-body">
                  {ws.map(w => (
                    <div key={w.id} className="hist-item">
                      <div className={`hist-dot ${w.type}`} />
                      <div className="hist-item-text">
                        <strong>{META[w.type].label}</strong>
                        {' — '}
                        <span style={{ color: 'var(--text-muted)' }}>{summarize(w.type, w.data)}</span>
                      </div>
                      <button className="act-del" title="Edit" onClick={() => setEditItem(w)} style={{ marginLeft: 'auto', flexShrink: 0 }}>
                        <IPencil />
                      </button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
        {editItem && <AddSheet date={editItem.date} existing={editItem} onClose={() => setEditItem(null)} onSaved={async () => { setEditItem(null); await load(); }} />}
      </>
    );
  }

  /* ── Main App ────────────────────────────────────────────────────────── */
  function MainApp({ user, onLogout }) {
    const [view,    setView]    = useState('log');
    const [showAdd, setShowAdd] = useState(false);

    return (
      <div className="shell">

        {/* ── Desktop sidebar ── */}
        <aside className="desktop-sidebar">
          <div className="sb-brand">
            <div className="sb-mark"><IDumbbell /></div>
            <span className="sb-name">Hope's Workout Log</span>
          </div>

          <nav className="sb-nav">
            <button className={`sb-tab ${view === 'log' ? 'active' : ''}`} onClick={() => setView('log')}>
              <ICalendar /><span>Log</span>
            </button>
            <button className={`sb-tab ${view === 'history' ? 'active' : ''}`} onClick={() => setView('history')}>
              <IHistory /><span>History</span>
            </button>
          </nav>

          {view === 'log' && (
            <button className="sb-add" onClick={() => setShowAdd(true)}>
              <IPlus /><span>Log activity</span>
            </button>
          )}

          <div className="sb-bottom">
            <button className="sb-signout" onClick={onLogout}>Sign out</button>
          </div>
        </aside>

        {/* ── Mobile header ── */}
        <header className="app-header">
          <div className="header-brand">
            <div className="header-mark"><IDumbbell /></div>
            <span className="header-name">Hope's Workout Log</span>
          </div>
          <button className="btn-signout" onClick={onLogout}>Sign out</button>
        </header>

        {/* ── Content ── */}
        <div className="content">
          {view === 'log'     && <DayView     user={user} showAdd={showAdd} setShowAdd={setShowAdd} />}
          {view === 'history' && <HistoryView user={user} />}
        </div>

        {/* ── Mobile bottom nav ── */}
        <nav className="bottom-nav">
          <button className={`nav-tab ${view === 'log' ? 'active' : ''}`} onClick={() => setView('log')}>
            <ICalendar /><span>Log</span>
          </button>
          <button className={`nav-tab ${view === 'history' ? 'active' : ''}`} onClick={() => setView('history')}>
            <IHistory /><span>History</span>
          </button>
        </nav>

      </div>
    );
  }

  /* ── Login ───────────────────────────────────────────────────────────── */
  function LoginScreen({ onLogin }) {
    const [email, setEmail] = useState('');
    const [pass,  setPass]  = useState('');
    const [busy,  setBusy]  = useState(false);
    const [err,   setErr]   = useState('');

    const submit = async (e) => {
      e.preventDefault(); setBusy(true); setErr('');
      const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
      setBusy(false);
      if (error) { setErr(error.message); return; }
      onLogin(data.user);
    };

    return (
      <div className="login-wrap">
        <div className="login-card">
          <div className="login-mark"><IDumbbell /></div>
          <h1>Hope's Workout Log</h1>
          <p className="tagline">Your personal training journal. Sign in to get started.</p>
          {err && <div className="err">{err}</div>}
          <form onSubmit={submit}>
            <div className="field">
              <label>Email</label>
              <input type="email" placeholder="you@example.com" value={email}
                onChange={e => setEmail(e.target.value)}
                required autoComplete="email" />
            </div>
            <div className="field">
              <label>Password</label>
              <input type="password" placeholder="••••••••" value={pass}
                onChange={e => setPass(e.target.value)}
                required autoComplete="current-password" />
            </div>
            <button type="submit" className="btn btn-primary" style={{ marginTop: 8 }} disabled={busy}>
              {busy ? <><span className="spinner" /> Signing in…</> : 'Sign in'}
            </button>
          </form>
        </div>
      </div>
    );
  }

  /* ── Setup Screen ────────────────────────────────────────────────────── */
  function SetupScreen() {
    return (
      <div className="login-wrap">
        <div className="login-card">
          <div className="login-mark"><IDumbbell /></div>
          <h1>Setup required</h1>
          <p className="tagline">Open <code style={{fontFamily:'monospace', background:'var(--surface-2)', padding:'2px 6px', borderRadius:5}}>index.html</code> and replace the two placeholder values near the top of the script:</p>
          <div style={{background:'var(--surface-2)', borderRadius: 10, padding:'14px 16px', marginTop:14, fontFamily:'monospace', fontSize:13, lineHeight:1.7, color:'var(--text-muted)'}}>
            <div><span style={{color:'var(--accent)'}}>YOUR_SUPABASE_URL</span></div>
            <div><span style={{color:'var(--accent)'}}>YOUR_SUPABASE_ANON_KEY</span></div>
          </div>
          <p style={{marginTop:14, fontSize:13, color:'var(--text-muted)', lineHeight:1.55}}>
            Find these in your Supabase project under <strong>Settings → API</strong>. Then reload the page.
          </p>
        </div>
      </div>
    );
  }

  /* ── App Root ────────────────────────────────────────────────────────── */
  function App() {
    if (!IS_CONFIGURED) return <SetupScreen />;
    const [user,    setUser]    = useState(null);
    const [loading, setLoading] = useState(true);

    useEffect(() => {
      sb.auth.getSession().then(({ data: { session } }) => {
        setUser(session?.user ?? null);
        setLoading(false);
      });
      const { data: { subscription } } = sb.auth.onAuthStateChange((_evt, session) => {
        setUser(session?.user ?? null);
      });
      return () => subscription.unsubscribe();
    }, []);

    if (loading) return (
      <div style={{ minHeight: '100dvh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <div style={{ color: 'var(--text-muted)', fontSize: 14 }}>Loading…</div>
      </div>
    );

    if (!user) return <LoginScreen onLogin={setUser} />;

    return <MainApp user={user} onLogout={async () => { await sb.auth.signOut(); setUser(null); }} />;
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
