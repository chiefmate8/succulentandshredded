<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hope's Workout Log</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           oklch(97% 0.008 60);
      --surface:      #ffffff;
      --surface-2:    oklch(96% 0.006 58);
      --surface-3:    oklch(93% 0.007 58);
      --text:         oklch(22% 0.01 55);
      --text-muted:   oklch(52% 0.012 55);
      --text-subtle:  oklch(70% 0.008 55);
      --accent:       oklch(62% 0.19 28);
      --accent-d:     oklch(56% 0.19 28);
      --accent-lt:    oklch(95% 0.045 28);
      --sage:         oklch(56% 0.13 162);
      --sage-lt:      oklch(94% 0.04 162);
      --indigo:       oklch(54% 0.17 272);
      --indigo-lt:    oklch(94% 0.04 272);
      --amber:        oklch(68% 0.16 76);
      --amber-lt:     oklch(95% 0.05 76);
      --red:          oklch(55% 0.19 25);
      --red-lt:       oklch(96% 0.04 25);
      --border:       oklch(90% 0.006 58);
      --border-focus: var(--accent);
      --r:            14px;
      --r-sm:         9px;
      --shadow:       0 1px 3px oklch(0% 0 0/.05), 0 4px 14px oklch(0% 0 0/.05);
      --shadow-sm:    0 1px 2px oklch(0% 0 0/.06);
      --font:         'DM Sans', -apple-system, sans-serif;
      --max-w:        500px;
      --nav-h:        64px;
    }

    html { -webkit-tap-highlight-color: transparent; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    #root { min-height: 100dvh; }

    /* ── Shell ─────────────────────────────────────────────────────── */
    .shell {
      max-width: var(--max-w);
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ── Header ────────────────────────────────────────────────────── */
    .app-header {
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-brand { display: flex; align-items: center; gap: 10px; }

    .header-mark {
      width: 34px; height: 34px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .header-mark svg { width: 20px; height: 20px; stroke: white; fill: none; }

    .header-name {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.25px;
    }

    .btn-signout {
      font-family: var(--font);
      font-size: 13px;
      color: var(--text-subtle);
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 7px;
      transition: all .15s;
    }
    .btn-signout:hover { background: var(--surface-2); color: var(--text-muted); }

    /* ── Content ───────────────────────────────────────────────────── */
    .content {
      flex: 1;
      padding: 18px 16px calc(var(--nav-h) + 28px + env(safe-area-inset-bottom));
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* ── Bottom nav ────────────────────────────────────────────────── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: var(--max-w);
      height: calc(var(--nav-h) + env(safe-area-inset-bottom));
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      padding-top: 8px;
      z-index: 10;
    }

    .nav-tab {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      background: none; border: none; cursor: pointer;
      font-family: var(--font); color: var(--text-subtle);
      padding: 6px 0;
      transition: color .15s;
    }
    .nav-tab.active { color: var(--accent); }
    .nav-tab svg { width: 23px; height: 23px; }
    .nav-tab span { font-size: 11px; font-weight: 500; letter-spacing: .03em; }

    /* ── FAB ───────────────────────────────────────────────────────── */
    .fab {
      position: fixed;
      bottom: calc(var(--nav-h) + 14px + env(safe-area-inset-bottom));
      right: 20px;
      width: 54px; height: 54px;
      background: var(--accent);
      color: white;
      border: none; cursor: pointer;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 18px oklch(62% 0.19 28 / 0.38);
      transition: transform .15s, box-shadow .15s;
      z-index: 9;
    }
    .fab:hover { transform: scale(1.06); box-shadow: 0 6px 22px oklch(62% 0.19 28 / 0.46); }
    .fab:active { transform: scale(0.95); }
    .fab svg { width: 24px; height: 24px; }

    @media (min-width: 500px) {
      .fab { right: calc((100vw - 500px) / 2 + 20px); }
    }

    /* ── Date bar ──────────────────────────────────────────────────── */
    .date-bar {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 18px; gap: 12px;
    }
    .date-main { font-size: 22px; font-weight: 600; letter-spacing: -.5px; }
    .date-sub { font-size: 13px; color: var(--text-muted); margin-top: 1px; }

    .date-input {
      background: var(--surface-2);
      border: 1.5px solid transparent;
      border-radius: 8px;
      padding: 7px 10px;
      font-family: var(--font);
      font-size: 13px; color: var(--text-muted);
      cursor: pointer; outline: none;
      -webkit-appearance: none;
      transition: border-color .15s;
    }
    .date-input:focus { border-color: var(--accent); background: var(--surface); }

    /* ── Section label ─────────────────────────────────────────────── */
    .section-label {
      font-size: 11px; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      color: var(--text-subtle);
      margin-bottom: 11px;
    }

    /* ── Activity card ─────────────────────────────────────────────── */
    .act-card {
      background: var(--surface);
      border-radius: var(--r);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      padding: 15px 14px;
      margin-bottom: 10px;
      display: flex; align-items: flex-start; gap: 13px;
    }

    .act-badge {
      width: 42px; height: 42px; border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .act-badge.cycling  { background: var(--sage-lt); }
    .act-badge.weights  { background: var(--accent-lt); }
    .act-badge.gym      { background: var(--indigo-lt); }
    .act-badge.other    { background: var(--amber-lt); }

    .act-body { flex: 1; min-width: 0; }
    .act-type { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text-subtle); margin-bottom: 3px; }
    .act-summary { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 3px; text-wrap: pretty; }
    .act-detail { font-size: 13px; color: var(--text-muted); line-height: 1.5; white-space: pre-line; }

    .act-del {
      width: 32px; height: 32px; border-radius: 8px;
      background: none; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-subtle); flex-shrink: 0;
      transition: all .15s;
    }
    .act-del:hover { background: var(--red-lt); color: var(--red); }
    .act-del svg { width: 16px; height: 16px; }

    /* ── Empty state ───────────────────────────────────────────────── */
    .empty {
      text-align: center; padding: 52px 24px;
      color: var(--text-muted);
    }
    .empty-icon { font-size: 36px; opacity: .35; margin-bottom: 16px; }
    .empty h3 { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .empty p { font-size: 14px; line-height: 1.55; }

    /* ── History ───────────────────────────────────────────────────── */
    .hist-day {
      background: var(--surface);
      border-radius: var(--r);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      margin-bottom: 10px;
      overflow: hidden;
    }
    .hist-day-hd {
      padding: 14px 15px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none;
    }
    .hist-day-date { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .hist-day-meta { font-size: 12px; color: var(--text-muted); }
    .hist-day-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .hist-day-pills { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }

    .pill {
      font-size: 10px; font-weight: 700; letter-spacing: .04em;
      padding: 3px 7px; border-radius: 20px;
    }
    .pill.cycling { background: var(--sage-lt); color: var(--sage); }
    .pill.weights { background: var(--accent-lt); color: var(--accent); }
    .pill.gym     { background: var(--indigo-lt); color: var(--indigo); }
    .pill.other   { background: var(--amber-lt); color: var(--amber); }

    .hist-day-body { border-top: 1px solid var(--border); padding: 10px 15px; }
    .hist-item {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 0;
    }
    .hist-item + .hist-item { border-top: 1px solid var(--border); }
    .hist-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .hist-dot.cycling { background: var(--sage); }
    .hist-dot.weights { background: var(--accent); }
    .hist-dot.gym     { background: var(--indigo); }
    .hist-dot.other   { background: var(--amber); }
    .hist-item-text { font-size: 13.5px; }

    /* ── Sheet ─────────────────────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: oklch(0% 0 0 / .42);
      z-index: 100;
      display: flex; align-items: flex-end; justify-content: center;
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    .sheet {
      width: 100%; max-width: var(--max-w);
      background: var(--surface);
      border-radius: 22px 22px 0 0;
      max-height: 94dvh;
      display: flex; flex-direction: column;
      animation: slideUp .28s cubic-bezier(.32,.72,0,1);
    }
    .sheet-pull { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; flex-shrink: 0; }
    .sheet-hd {
      padding: 14px 18px 14px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sheet-hd h2 { font-size: 16px; font-weight: 600; letter-spacing: -.2px; }
    .sheet-body {
      flex: 1; overflow-y: auto; padding: 18px 18px 4px;
      -webkit-overflow-scrolling: touch;
    }
    .sheet-ft {
      padding: 12px 18px calc(16px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* ── Type grid ─────────────────────────────────────────────────── */
    .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 22px; }
    .type-opt {
      padding: 13px 12px;
      border: 2px solid var(--border);
      border-radius: var(--r);
      background: var(--surface);
      display: flex; align-items: center; gap: 9px;
      cursor: pointer; text-align: left;
      font-family: var(--font);
      transition: all .15s;
    }
    .type-opt:hover { border-color: oklch(80% 0.09 28); }
    .type-opt.sel { border-color: var(--accent); background: var(--accent-lt); }
    .type-opt-icon { font-size: 21px; width: 26px; text-align: center; }
    .type-opt-name { font-size: 14px; font-weight: 600; color: var(--text); }

    /* ── Form fields ───────────────────────────────────────────────── */
    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: 11px; font-weight: 700;
      letter-spacing: .07em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 5px;
    }
    .field input, .field textarea, .field select {
      width: 100%;
      background: var(--surface-2);
      border: 1.5px solid transparent;
      border-radius: var(--r-sm);
      padding: 10px 13px;
      font-family: var(--font); font-size: 15px;
      color: var(--text); outline: none;
      transition: border-color .15s, background .15s;
      -webkit-appearance: none;
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      border-color: var(--accent); background: var(--surface);
    }
    .field input::placeholder, .field textarea::placeholder { color: var(--text-subtle); }
    .field textarea { resize: none; height: 70px; line-height: 1.5; }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

    /* ── Exercises (weights) ───────────────────────────────────────── */
    .ex-block {
      background: var(--surface-2);
      border-radius: 11px;
      padding: 12px;
      margin-bottom: 8px;
    }
    .ex-block-hd {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .ex-num { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text-muted); }
    .ex-remove {
      font-family: var(--font); font-size: 12px; color: var(--text-subtle);
      background: none; border: none; cursor: pointer; padding: 3px 7px; border-radius: 5px;
      transition: all .15s;
    }
    .ex-remove:hover { background: var(--red-lt); color: var(--red); }
    .ex-name { margin-bottom: 8px; }
    .ex-name input {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--r-sm); padding: 9px 12px;
      font-family: var(--font); font-size: 14px; color: var(--text);
      outline: none; width: 100%; transition: border-color .15s;
    }
    .ex-name input:focus { border-color: var(--accent); }
    .ex-name input::placeholder { color: var(--text-subtle); }
    .ex-add-btn {
      width: 100%; padding: 10px;
      border: 2px dashed var(--border); border-radius: 10px;
      background: none; font-family: var(--font);
      font-size: 13px; font-weight: 500;
      color: var(--text-muted); cursor: pointer;
      margin-bottom: 16px; transition: all .15s;
    }
    .ex-add-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Buttons ───────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 12px 20px; border-radius: var(--r-sm);
      font-family: var(--font); font-size: 15px; font-weight: 500;
      cursor: pointer; border: none; transition: all .15s; white-space: nowrap;
    }
    .btn-primary { background: var(--accent); color: white; width: 100%; }
    .btn-primary:hover { background: var(--accent-d); }
    .btn-primary:active { transform: scale(.98); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
    .btn-ghost { background: transparent; color: var(--text-muted); border: 1.5px solid var(--border); }
    .btn-ghost:hover { border-color: var(--text-muted); }
    .btn-dest { background: var(--red); color: white; }
    .btn-dest:hover { background: oklch(50% 0.19 25); }
    .btn-icon {
      width: 34px; height: 34px; padding: 0; border-radius: 50%;
      background: transparent; border: none; color: var(--text-muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background .15s;
    }
    .btn-icon:hover { background: var(--surface-2); }
    .btn-icon svg { width: 20px; height: 20px; }

    /* ── Error msg ─────────────────────────────────────────────────── */
    .err {
      background: var(--red-lt); color: var(--red);
      border-radius: var(--r-sm); padding: 10px 13px;
      font-size: 13px; margin-bottom: 14px; line-height: 1.45;
    }

    /* ── Confirm dialog ────────────────────────────────────────────── */
    .confirm-overlay {
      position: fixed; inset: 0;
      background: oklch(0% 0 0 / .38);
      z-index: 200; display: flex; align-items: center; justify-content: center;
      padding: 24px; animation: fadeIn .15s ease;
    }
    .confirm-card {
      background: var(--surface); border-radius: 18px;
      padding: 28px 22px; width: 100%; max-width: 310px; text-align: center;
    }
    .confirm-card h3 { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
    .confirm-card p { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.5; }
    .confirm-btns { display: flex; gap: 8px; }
    .confirm-btns .btn { flex: 1; }

    /* ── Login ─────────────────────────────────────────────────────── */
    .login-wrap {
      min-height: 100dvh; display: flex;
      align-items: center; justify-content: center;
      padding: 24px; background: var(--bg);
    }
    .login-card {
      width: 100%; max-width: 370px;
      background: var(--surface); border-radius: 22px;
      padding: 38px 30px; border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .login-mark {
      width: 52px; height: 52px; background: var(--accent);
      border-radius: 15px; display: flex; align-items: center; justify-content: center;
      margin-bottom: 22px;
    }
    .login-mark svg { width: 28px; height: 28px; stroke: white; fill: none; }
    .login-card h1 { font-size: 23px; font-weight: 700; letter-spacing: -.5px; margin-bottom: 5px; }
    .login-card .tagline { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; line-height: 1.4; }

    /* ── Loading ───────────────────────────────────────────────────── */
    .loading {
      display: flex; align-items: center; justify-content: center;
      min-height: 180px; color: var(--text-muted); font-size: 14px;
    }

    /* ── Spinner ───────────────────────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2.5px solid oklch(100% 0 0 / .35);
      border-top-color: white;
      animation: spin .7s linear infinite;
      display: inline-block;
    }

    /* ── Chevron ───────────────────────────────────────────────────── */
    .chevron {
      width: 16px; height: 16px; color: var(--text-subtle);
      transition: transform .2s;
    }
    .chevron.open { transform: rotate(90deg); }

    /* ── Exercise progressive toggle ──────────────────────────────── */
    .ex-toggle-row {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 4px 0 8px;
    }
    .ex-toggle-label { font-size: 13px; font-weight: 500; color: var(--text-muted); }

    .toggle-sw {
      position: relative; width: 40px; height: 22px;
      background: var(--border); border: none; border-radius: 11px;
      cursor: pointer; padding: 0; flex-shrink: 0;
      transition: background .2s;
    }
    .toggle-sw.on { background: var(--accent); }
    .toggle-thumb {
      position: absolute; top: 3px; left: 3px;
      width: 16px; height: 16px;
      background: white; border-radius: 50%;
      transition: transform .2s; display: block;
    }
    .toggle-sw.on .toggle-thumb { transform: translateX(18px); }

    /* ── Set groups ────────────────────────────────────────────────── */
    .ex-set-groups { margin-bottom: 6px; }
    .set-group {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px; margin-bottom: 6px;
    }
    .set-group-hd {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 6px;
    }
    .ex-sg-add {
      width: 100%; padding: 7px;
      border: 1.5px dashed var(--border); border-radius: 7px;
      background: none; font-family: var(--font);
      font-size: 12px; font-weight: 500;
      color: var(--text-subtle); cursor: pointer;
      margin-bottom: 8px; transition: all .15s;
    }
    .ex-sg-add:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Desktop sidebar (hidden on mobile) ────────────────────────── */
    .desktop-sidebar { display: none; }

    /* ════════════════════════════════════════════════════════════════
       DESKTOP / TABLET  ≥ 640px
    ════════════════════════════════════════════════════════════════ */
    @media (min-width: 640px) {

      /* Allow user to zoom/scroll on desktop */
      html { overflow-y: auto; }

      body { background: var(--bg); display: flex; justify-content: center; }

      #root { width: 100%; }

      /* ── Shell becomes a horizontal split ── */
      .shell {
        flex-direction: row;
        max-width: 1100px;
        margin: 0 auto;
        min-height: 100dvh;
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
        background: var(--surface);
      }

      /* ── Hide mobile-only chrome ── */
      .app-header  { display: none; }
      .bottom-nav  { display: none; }
      .fab         { display: none; }

      /* ── Desktop sidebar ── */
      .desktop-sidebar {
        display: flex;
        flex-direction: column;
        width: 220px;
        flex-shrink: 0;
        border-right: 1px solid var(--border);
        background: var(--surface);
        padding: 28px 16px 24px;
        position: sticky;
        top: 0;
        height: 100dvh;
        overflow-y: auto;
      }

      .sb-brand {
        display: flex; align-items: center; gap: 10px;
        padding: 0 4px;
        margin-bottom: 32px;
      }
      .sb-mark {
        width: 36px; height: 36px; background: var(--accent);
        border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
      }
      .sb-mark svg { width: 20px; height: 20px; stroke: white; fill: none; }
      .sb-name { font-size: 14px; font-weight: 700; letter-spacing: -.3px; line-height: 1.3; }

      .sb-nav { flex: 1; display: flex; flex-direction: column; gap: 2px; }

      .sb-tab {
        display: flex; align-items: center; gap: 9px;
        padding: 9px 10px; border-radius: 9px;
        background: none; border: none; cursor: pointer;
        font-family: var(--font); font-size: 14px; font-weight: 500;
        color: var(--text-muted); width: 100%; text-align: left;
        transition: all .15s;
      }
      .sb-tab svg { width: 19px; height: 19px; flex-shrink: 0; }
      .sb-tab:hover  { background: var(--surface-2); color: var(--text); }
      .sb-tab.active { background: var(--accent-lt); color: var(--accent); }

      .sb-add {
        display: flex; align-items: center; justify-content: center; gap: 7px;
        width: 100%; padding: 10px 14px; margin-top: 14px;
        background: var(--accent); color: white;
        border: none; border-radius: 9px; cursor: pointer;
        font-family: var(--font); font-size: 14px; font-weight: 600;
        transition: background .15s;
      }
      .sb-add:hover { background: var(--accent-d); }
      .sb-add svg { width: 17px; height: 17px; }

      .sb-bottom { margin-top: 16px; }
      .sb-signout {
        font-family: var(--font); font-size: 13px;
        color: var(--text-subtle);
        background: none; border: none; cursor: pointer;
        padding: 7px 10px; border-radius: 8px; width: 100%; text-align: left;
        transition: all .15s;
      }
      .sb-signout:hover { background: var(--surface-2); color: var(--text-muted); }

      /* ── Content area ── */
      .content {
        flex: 1;
        padding: 36px 40px 48px;
        background: var(--bg);
        max-width: 780px;
        overflow-y: auto;
        height: 100dvh;
      }

      /* ── Bigger date heading ── */
      .date-main { font-size: 26px; letter-spacing: -.6px; }

      /* ── Sheet → centered dialog on desktop ── */
      .overlay { align-items: center; }
      .sheet {
        border-radius: 20px;
        max-width: 500px;
        max-height: 88dvh;
        margin: 0 auto;
        width: calc(100% - 48px);
        animation: modalIn .22s cubic-bezier(.34,1.4,.64,1);
      }
      .sheet-pull { display: none; }

      @keyframes modalIn {
        from { opacity: 0; transform: scale(.96) translateY(6px); }
        to   { opacity: 1; transform: scale(1)   translateY(0);   }
      }

      /* ── Slightly larger cards on desktop ── */
      .act-card { padding: 18px 16px; gap: 15px; }
      .act-badge { width: 46px; height: 46px; font-size: 22px; }

      /* ── History: two columns on wide desktop ── */
      @media (min-width: 1024px) {
        .shell { max-width: 1200px; }
        .desktop-sidebar { width: 240px; }
        .content { padding: 40px 56px 56px; max-width: none; }
      }
    }

    /* ── Period tabs ───────────────────────────────────────────────── */
    .period-tabs { display: flex; background: var(--surface-2); border-radius: 10px; padding: 3px; margin-bottom: 20px; gap: 2px; }
    .period-tab { flex: 1; padding: 8px 4px; border: none; background: none; font-family: var(--font); font-size: 13px; font-weight: 500; color: var(--text-muted); border-radius: 8px; cursor: pointer; transition: all .15s; }
    .period-tab.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow-sm); font-weight: 600; }

    /* ── Stat cards ────────────────────────────────────────────────── */
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 16px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 16px 14px; box-shadow: var(--shadow-sm); }
    .stat-val { font-size: 28px; font-weight: 700; letter-spacing: -1px; line-height: 1.1; }
    .stat-label { font-size: 12px; color: var(--text-muted); font-weight: 500; margin-top: 3px; }

    /* ── Type stat rows ────────────────────────────────────────────── */
    .type-stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 13px 14px; margin-bottom: 8px; box-shadow: var(--shadow-sm); display: flex; align-items: center; gap: 12px; }
    .type-stat-info { flex: 1; min-width: 0; }
    .type-stat-name { font-size: 14px; font-weight: 600; }
    .type-stat-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .type-stat-count { font-size: 22px; font-weight: 700; flex-shrink: 0; }
    .type-stat.cycling .type-stat-count { color: var(--sage); }
    .type-stat.weights .type-stat-count { color: var(--accent); }
    .type-stat.gym     .type-stat-count { color: var(--indigo); }
    .type-stat.other   .type-stat-count { color: var(--amber); }

    /* ── Chart card ────────────────────────────────────────────────── */
    .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; margin-bottom: 10px; box-shadow: var(--shadow-sm); }
    .chart-card-title { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text-subtle); margin-bottom: 14px; }

    /* ── Streak ────────────────────────────────────────────────────── */
    .streak-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 10px; }
    .streak-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 20px 14px; box-shadow: var(--shadow-sm); text-align: center; }
    .streak-val { font-size: 38px; font-weight: 700; letter-spacing: -2px; color: var(--accent); line-height: 1; }
    .streak-unit { font-size: 12px; color: var(--text-subtle); margin-top: 2px; }
    .streak-label { font-size: 12px; color: var(--text-muted); font-weight: 500; margin-top: 6px; }

    /* ── Exercise ranking ──────────────────────────────────────────── */
    .ex-rank-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .ex-rank-item:last-child { border-bottom: none; }
    .ex-rank-n { width: 18px; font-size: 11px; font-weight: 700; color: var(--text-subtle); text-align: right; flex-shrink: 0; }
    .ex-rank-name { font-size: 13.5px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; width: 110px; }
    .ex-rank-bar { flex: 1; height: 5px; background: var(--surface-2); border-radius: 3px; overflow: hidden; }
    .ex-rank-fill { height: 100%; background: var(--accent); border-radius: 3px; }
    .ex-rank-cnt { font-size: 12px; color: var(--text-muted); flex-shrink: 0; }

    /* ── Legend ────────────────────────────────────────────────────── */
    .type-legend { display: flex; flex-wrap: wrap; gap: 8px 16px; margin-top: 12px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-muted); }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .legend-dot.cycling { background: var(--sage); }
    .legend-dot.weights { background: var(--accent); }
    .legend-dot.gym     { background: var(--indigo); }
    .legend-dot.other   { background: var(--amber); }

    /* ── Day strip ─────────────────────────────────────────────────── */
    .day-strip { display: flex; overflow-x: auto; gap: 2px; padding-bottom: 4px; -webkit-overflow-scrolling: touch; scrollbar-width: none; margin-bottom: 16px; }
    .day-strip::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useCallback, useRef } = React;

  /* ╔══════════════════════════════════════════════════════════════════╗
     ║  CONFIGURATION — replace these two values with your own project  ║
     ║  Settings → API in the Supabase dashboard                        ║
     ╚══════════════════════════════════════════════════════════════════╝ */
  const SUPABASE_URL      = 'https://qqnrjxwuyqiteambaiev.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_ogXay9KGeHpKRhHLXgzAlw_FJ_ADGnI';
  /* ═══════════════════════════════════════════════════════════════════ */

  const IS_CONFIGURED = SUPABASE_URL.startsWith('http');
  const sb = IS_CONFIGURED
    ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    : null;

  /* ── Utils ───────────────────────────────────────────────────────────── */
  const todayStr = () => new Date().toISOString().split('T')[0];

  const fmtDate = (s) => {
    const [y, m, d] = s.split('-').map(Number);
    const dt = new Date(y, m - 1, d);
    const t  = new Date(); const yd = new Date(); yd.setDate(t.getDate() - 1);
    if (dt.toDateString() === t.toDateString())  return 'Today';
    if (dt.toDateString() === yd.toDateString()) return 'Yesterday';
    return dt.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
  };

  const fmtShort = (s) => {
    const [y, m, d] = s.split('-').map(Number);
    return new Date(y, m - 1, d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
  };

  const toTitleCase = (s) => (s || '').split(' ').map(w => w ? w[0].toUpperCase() + w.slice(1).toLowerCase() : '').join(' ');

  const META = {
    cycling: { label: 'Cycling',   emoji: '🚴', cls: 'cycling' },
    weights: { label: 'Weights',   emoji: '🏋️', cls: 'weights' },
    gym:     { label: 'Gym',        emoji: '🏃', cls: 'gym'     },
    other:   { label: 'Other',     emoji: '✨', cls: 'other'   },
  };

  const summarize = (type, data) => {
    if (!data) return '';
    if (type === 'cycling') {
      const ps = [data.duration && `${data.duration} min`, data.distance && `${data.distance} km`].filter(Boolean);
      return ps.join(' · ') || 'Cycling session';
    }
    if (type === 'weights') {
      const ex = data.exercises || [];
      if (ex.length === 0) return 'Weights session';
      if (ex.length === 1) return ex[0].name || '1 exercise';
      return `${ex.length} exercises`;
    }
    if (type === 'gym') {
      const ps = [data.machine, data.duration && `${data.duration} min`].filter(Boolean);
      return ps.join(' · ') || 'Gym session';
    }
    if (type === 'other') return data.name || 'Activity';
    return '';
  };

  const getDetail = (type, data) => {
    if (!data) return null;
    if (type === 'cycling') return data.notes || null;
    if (type === 'gym')     return data.notes || null;
    if (type === 'other') {
      const ps = [data.duration && `${data.duration} min`, data.notes].filter(Boolean);
      return ps.join(' · ') || null;
    }
    if (type === 'weights') {
      const ex = (data.exercises || []).slice(0, 4);
      if (!ex.length) return null;
      return ex.map(e => {
        const name = e.name || 'Exercise';
        // Old flat structure: { name, weight, sets, reps }
        if ('sets' in e || 'reps' in e) {
          let s = name;
          if (e.weight) s += ` — ${e.weight} kg`;
          if (e.sets && e.reps) s += ` · ${e.sets}×${e.reps}`;
          return s;
        }
        // New structure: { name, progressiveWeight, weight?, setGroups }
        const sgs = e.setGroups || [];
        if (!sgs.length) return name;
        const exMode = e.mode || 'reps';
        const fmtSg = (sg) => {
          if (exMode === 'duration') {
            const unit = sg.unit || 'seconds';
            const suffix = unit === 'minutes' ? 'min' : 's';
            return `${sg.sets || '?'}×${sg.duration || '?'}${suffix}`;
          }
          return `${sg.sets || '?'}×${sg.reps || '?'}`;
        };
        if (e.progressiveWeight) {
          const parts = sgs.map(sg => {
            let p = fmtSg(sg);
            if (sg.weight) p += ` @ ${sg.weight}kg`;
            return p;
          });
          return `${name} — ${parts.join(' → ')}`;
        } else {
          const parts = sgs.map(fmtSg).join(', ');
          let s = `${name} — ${parts}`;
          if (e.weight) s += ` @ ${e.weight}kg`;
          return s;
        }
      }).join('\n');
    }
    return null;
  };

  /* ── SVG Icons ───────────────────────────────────────────────────────── */
  const IPlus   = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>;
  const IClose  = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>;
  const ITrash  = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>;
  const IChev   = ({ open }) => <svg className={`chevron ${open ? 'open' : ''}`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18l6-6-6-6"/></svg>;
  const IPencil = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;

  const IDumbbell = () => (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M6 4h2v16H6zM16 4h2v16h-2z"/>
      <path d="M4 7h4M4 17h4M16 7h4M16 17h4M8 12h8"/>
    </svg>
  );

  const ICalendar = () => (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <rect x="3" y="4" width="18" height="18" rx="3"/>
      <path d="M16 2v4M8 2v4M3 10h18"/>
    </svg>
  );

  const IHistory = () => (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M3 3v6h6M21 12A9 9 0 0 0 6 5.3L3 8M12 7v5l4 2"/>
    </svg>
  );

  const IReview = () => (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <rect x="3" y="4" width="18" height="18" rx="3"/>
      <path d="M16 2v4M8 2v4M3 10h18"/>
      <path d="M8 15h2M14 15h2M8 19h2M14 19h2" strokeWidth="2.5"/>
    </svg>
  );

  const IBarChart = () => (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <line x1="3" y1="21" x2="21" y2="21"/>
      <rect x="4" y="13" width="4" height="8" rx="1"/>
      <rect x="10" y="7" width="4" height="14" rx="1"/>
      <rect x="16" y="3" width="4" height="18" rx="1"/>
    </svg>
  );

  /* ── SVG color constants (CSS vars don't work in SVG fill attr) ── */
  const SC = {
    cycling: 'oklch(56% 0.13 162)',
    weights: 'oklch(62% 0.19 28)',
    gym:     'oklch(54% 0.17 272)',
    other:   'oklch(68% 0.16 76)',
    bg2:     'oklch(93% 0.007 58)',
    border:  'oklch(90% 0.006 58)',
    muted:   'oklch(70% 0.008 55)',
  };

  /* ── Date helpers ────────────────────────────────────────────────── */
  const localDateStr = (d) =>
    `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

  const getWeekMonday = (dateStr) => {
    const [y, m, d] = dateStr.split('-').map(Number);
    const dt = new Date(y, m - 1, d);
    const dow = dt.getDay();
    dt.setDate(dt.getDate() - (dow === 0 ? 6 : dow - 1));
    return localDateStr(dt);
  };

  /* ── WeekCalendar ────────────────────────────────────────────────── */
  function WeekCalendar({ startDate, endDate, dateMap }) {
    const days = [];
    const cur = new Date(startDate);
    const today = localDateStr(new Date());
    while (cur <= endDate) { days.push(new Date(cur)); cur.setDate(cur.getDate() + 1); }
    const DAY = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const TYPE_C = { cycling: 'var(--sage)', weights: 'var(--accent)', gym: 'var(--indigo)', other: 'var(--amber)' };
    return (
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 5 }}>
        {days.map(day => {
          const ds = localDateStr(day);
          const types = dateMap[ds] || [];
          const isToday = ds === today;
          return (
            <div key={ds} style={{
              background: types.length ? 'var(--surface-2)' : 'var(--surface)',
              border: isToday ? '2px solid var(--accent)' : '1px solid var(--border)',
              borderRadius: 10, padding: '8px 3px 7px', textAlign: 'center',
            }}>
              <div style={{ fontSize: 9, color: 'var(--text-subtle)', fontWeight: 700, letterSpacing: '.04em', textTransform: 'uppercase', marginBottom: 3 }}>
                {DAY[day.getDay()]}
              </div>
              <div style={{ fontSize: 15, fontWeight: isToday ? 700 : 500, marginBottom: 5, color: isToday ? 'var(--accent)' : 'var(--text)' }}>
                {day.getDate()}
              </div>
              <div style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', gap: 2, minHeight: 8 }}>
                {types.map(t => <div key={t} style={{ width: 6, height: 6, borderRadius: '50%', background: TYPE_C[t] }} />)}
              </div>
            </div>
          );
        })}
      </div>
    );
  }

  /* ── MonthCalendar ───────────────────────────────────────────────── */
  function MonthCalendar({ year, month, dateMap }) {
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const firstDow = new Date(year, month, 1).getDay();
    const startPad = firstDow === 0 ? 6 : firstDow - 1;
    const today = localDateStr(new Date());
    const TYPE_C = { cycling: 'var(--sage)', weights: 'var(--accent)', gym: 'var(--indigo)', other: 'var(--amber)' };
    const cells = [];
    for (let i = 0; i < startPad; i++) cells.push(null);
    for (let d = 1; d <= daysInMonth; d++) {
      const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      cells.push({ d, ds, types: dateMap[ds] || [], isToday: ds === today });
    }
    while (cells.length % 7 !== 0) cells.push(null);
    return (
      <div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 3, marginBottom: 3 }}>
          {['M','T','W','T','F','S','S'].map((l, i) => (
            <div key={i} style={{ textAlign: 'center', fontSize: 9, fontWeight: 700, color: 'var(--text-subtle)', letterSpacing: '.05em', textTransform: 'uppercase', padding: '3px 0' }}>{l}</div>
          ))}
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 3 }}>
          {cells.map((cell, i) => !cell ? <div key={i} style={{ aspectRatio: '1' }} /> : (
            <div key={i} style={{
              aspectRatio: '1', borderRadius: 7, display: 'flex', flexDirection: 'column',
              alignItems: 'center', justifyContent: 'center', padding: 2,
              background: cell.types.length ? 'var(--surface-2)' : 'var(--surface)',
              border: cell.isToday ? '2px solid var(--accent)' : '1px solid var(--border)',
            }}>
              <span style={{ fontSize: 12, fontWeight: cell.isToday ? 700 : 500, lineHeight: 1, color: cell.isToday ? 'var(--accent)' : 'var(--text)' }}>{cell.d}</span>
              <div style={{ display: 'flex', gap: 1.5, marginTop: 2, flexWrap: 'wrap', justifyContent: 'center' }}>
                {cell.types.slice(0, 3).map(t => <div key={t} style={{ width: 4, height: 4, borderRadius: '50%', background: TYPE_C[t] }} />)}
              </div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  /* ── YearHeatmap ─────────────────────────────────────────────────── */
  function YearHeatmap({ year, dateMap }) {
    const jan1 = new Date(year, 0, 1);
    const dec31 = new Date(year, 11, 31);
    const daysBack = (jan1.getDay() === 0 ? 6 : jan1.getDay() - 1);
    const gridStart = new Date(jan1); gridStart.setDate(jan1.getDate() - daysBack);
    const CELL = 11, GAP = 2, STEP = CELL + GAP;
    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const weeks = [];
    const cur = new Date(gridStart);
    while (cur <= dec31) {
      const week = [];
      for (let r = 0; r < 7; r++) {
        const ds = localDateStr(cur);
        week.push({ ds, types: dateMap[ds] || [], inYear: cur.getFullYear() === year, isFirst: cur.getDate() === 1 && cur.getFullYear() === year, month: cur.getMonth() });
        cur.setDate(cur.getDate() + 1);
      }
      weeks.push(week);
    }
    const monthLabels = [];
    weeks.forEach((wk, wi) => {
      wk.forEach(day => {
        if (day.isFirst && !monthLabels.find(ml => ml.m === day.month)) monthLabels.push({ m: day.month, x: 18 + wi * STEP });
      });
    });
    const getColor = (types, inYear) => {
      if (!inYear) return 'none';
      if (!types.length) return SC.bg2;
      if (types.length > 1) return 'oklch(72% 0.04 55)';
      return SC[types[0]] || SC.bg2;
    };
    const SVG_W = weeks.length * STEP + 18;
    const SVG_H = 7 * STEP + 16;
    return (
      <div style={{ overflowX: 'auto', paddingBottom: 4 }}>
        <svg width={SVG_W} height={SVG_H} viewBox={`0 0 ${SVG_W} ${SVG_H}`} style={{ display: 'block' }}>

  /* ── DayStrip ───────────────────────────────────────────────────── */
  function DayStrip({ selectedDate, onSelect }) {
    const selRef = useRef(null);
    const today = localDateStr(new Date());
    const DAY = ['Su','Mo','Tu','We','Th','Fr','Sa'];
    const days = [];
    const base = new Date();
    for (let i = 89; i >= 0; i--) {
      const d = new Date(base); d.setDate(base.getDate() - i); days.push(d);
    }
    useEffect(() => {
      if (selRef.current) selRef.current.scrollIntoView({ behavior: 'instant', block: 'nearest', inline: 'center' });
    }, [selectedDate]);
    return (
      <div className="day-strip">
        {days.map(day => {
          const ds = localDateStr(day);
          const isSel = ds === selectedDate;
          const isToday = ds === today;
          return (
            <button key={ds} ref={isSel ? selRef : null} onClick={() => onSelect(ds)} style={{
              flexShrink: 0, width: 40, padding: '7px 0 6px',
              background: isSel ? 'var(--accent)' : 'transparent',
              border: 'none', borderRadius: 10, cursor: 'pointer', textAlign: 'center', transition: 'background .15s',
            }}>
              <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: '.04em', textTransform: 'uppercase', color: isSel ? 'rgba(255,255,255,.7)' : 'var(--text-subtle)', marginBottom: 4 }}>
                {DAY[day.getDay()]}
              </div>
              <div style={{ fontSize: 15, fontWeight: isSel || isToday ? 700 : 400, color: isSel ? 'white' : isToday ? 'var(--accent)' : 'var(--text)', lineHeight: 1 }}>
                {day.getDate()}
              </div>
              {isToday && !isSel && <div style={{ width: 4, height: 4, borderRadius: '50%', background: 'var(--accent)', margin: '3px auto 0' }} />}
            </button>
          );
        })}
      </div>
    );
  }

  /* ── DonutChart ──────────────────────────────────────────────────── */
  function DonutChart({ segments, size = 110 }) {
    const total = segments.reduce((s, d) => s + d.value, 0);
    if (!total) return null;
    const cx = size/2, cy = size/2, R = size*0.42, r2 = size*0.26;
    const toXY = (a, r) => [cx + r*Math.cos(a - Math.PI/2), cy + r*Math.sin(a - Math.PI/2)];
    let angle = 0;
    const paths = segments.filter(s => s.value > 0).map(s => {
      const sweep = (s.value/total)*2*Math.PI;
      const sa = angle, ea = angle + sweep - 0.01; angle += sweep;
      const lg = sweep > Math.PI ? 1 : 0;
      const [sx,sy] = toXY(sa,R); const [ex,ey] = toXY(ea,R);
      const [six,siy] = toXY(sa,r2); const [eix,eiy] = toXY(ea,r2);
      return { ...s, path: `M${sx} ${sy}A${R} ${R} 0 ${lg} 1 ${ex} ${ey}L${eix} ${eiy}A${r2} ${r2} 0 ${lg} 0 ${six} ${siy}Z` };
    });
    return (
      <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size}>
        {paths.map((s,i) => <path key={i} d={s.path} fill={s.color} />)}
      </svg>
    );
  }

  /* ── StatsView ───────────────────────────────────────────────────── */
  function StatsView({ user }) {
    const [items, setItems] = useState([]);
    const [loading, setLoading] = useState(true);

    useEffect(() => {
      (async () => {
        const { data } = await sb.from('workouts').select('*').eq('user_id', user.id).order('date', { ascending: true });
        setItems(data || []); setLoading(false);
      })();
    }, [user.id]);

    const stats = React.useMemo(() => {
      if (!items.length) return null;
      const byType = { cycling:0, weights:0, gym:0, other:0 };
      items.forEach(w => { if (byType[w.type]!==undefined) byType[w.type]++; });

      /* weekly sessions (last 16 weeks) */
      const wMap = {};
      for (let i = 15; i >= 0; i--) {
        const d = new Date(); d.setDate(d.getDate() - i*7);
        const key = getWeekMonday(localDateStr(d));
        wMap[key] = { key, counts:{cycling:0,weights:0,gym:0,other:0}, total:0 };
      }
      items.forEach(w => {
        const key = getWeekMonday(w.date);
        if (wMap[key]) { wMap[key].counts[w.type]=(wMap[key].counts[w.type]||0)+1; wMap[key].total++; }
      });
      const weeklyData = Object.values(wMap).sort((a,b) => a.key.localeCompare(b.key));

      /* top exercises */
      const exC = {};
      items.filter(w => w.type==='weights').forEach(w => {
        ((w.data||{}).exercises||[]).forEach(e => { const n=toTitleCase(e.name||''); if(n) exC[n]=(exC[n]||0)+1; });
      });
      const topEx = Object.entries(exC).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([name,count])=>({name,count}));

      /* streak */
      const dateset = new Set(items.map(w => w.date));
      let streak = 0;
      const d0 = new Date();
      let ds = localDateStr(d0);
      if (!dateset.has(ds)) { d0.setDate(d0.getDate()-1); ds = localDateStr(d0); }
      while (dateset.has(ds)) { streak++; d0.setDate(d0.getDate()-1); ds = localDateStr(d0); }

      /* longest streak */
      const allDates = [...dateset].sort();
      let longest = 0, cur2 = 0, prev = null;
      allDates.forEach(date => {
        if (prev) {
          const diff = (new Date(date+'T00:00:00') - new Date(prev+'T00:00:00')) / 86400000;
          cur2 = diff === 1 ? cur2 + 1 : 1;
        } else { cur2 = 1; }
        if (cur2 > longest) longest = cur2;
        prev = date;
      });

      const totalMins = items.reduce((s,w) => s + (Number((w.data||{}).duration)||0), 0);
      const totalKm   = items.filter(w=>w.type==='cycling').reduce((s,w) => s + (Number((w.data||{}).distance)||0), 0);

      return { byType, weeklyData, topEx, streak, longest, totalMins, totalKm };
    }, [items]);

    if (loading) return <div className="loading">Loading stats…</div>;
    if (!stats) return (
      <div className="empty"><div className="empty-icon">📊</div><h3>No data yet</h3><p>Start logging activities to see your stats here.</p></div>
    );

    const { byType, weeklyData, topEx, streak, longest, totalMins, totalKm } = stats;
    const total = Object.values(byType).reduce((s,v)=>s+v,0);
    const donutSegments = [
      { label:'Cycling', value:byType.cycling, color:SC.cycling },
      { label:'Weights', value:byType.weights, color:SC.weights },
      { label:'Gym',     value:byType.gym,     color:SC.gym },
      { label:'Other',   value:byType.other,   color:SC.other },
    ];
    const maxWeek = Math.max(...weeklyData.map(w=>w.total), 1);
    const BAR_W = 14, BAR_GAP = 3, CHART_H = 90, LABEL_H = 16;
    const svgW = weeklyData.length * (BAR_W + BAR_GAP);
    const TYPE_ORDER = ['other','gym','cycling','weights'];

    return (
      <div>
        <div className="date-main" style={{ marginBottom: 18 }}>Stats</div>

        {/* Streaks */}
        <div className="streak-grid">
          <div className="streak-card">
            <div className="streak-val">{streak}</div>
            <div className="streak-unit">{streak===1?'day':'days'}</div>
            <div className="streak-label">Current streak</div>
          </div>
          <div className="streak-card">
            <div className="streak-val">{longest}</div>
            <div className="streak-unit">{longest===1?'day':'days'}</div>
            <div className="streak-label">Longest streak</div>
          </div>
        </div>

        {/* All-time totals */}
        <div className="stat-grid" style={{ marginBottom: 10 }}>
          <div className="stat-card"><div className="stat-val">{total}</div><div className="stat-label">total sessions</div></div>
          <div className="stat-card"><div className="stat-val">{totalMins > 0 ? totalMins : '—'}</div><div className="stat-label">active minutes</div></div>
          {totalKm > 0 && <div className="stat-card"><div className="stat-val">{Math.round(totalKm * 10)/10}</div><div className="stat-label">km cycled</div></div>}
        </div>

        {/* Weekly sessions bar chart */}
        <div className="chart-card">
          <div className="chart-card-title">Sessions per week — last 16 weeks</div>
          <div style={{ overflowX: 'auto' }}>
            <svg width={svgW} height={CHART_H + LABEL_H} viewBox={`0 0 ${svgW} ${CHART_H + LABEL_H}`} style={{ display:'block', minWidth: svgW }}>
              {weeklyData.map((wk, i) => {
                const x = i * (BAR_W + BAR_GAP);
                let yOff = CHART_H;
                const rects = TYPE_ORDER.map(t => {
                  const cnt = wk.counts[t] || 0;
                  if (!cnt) return null;
                  const bh = (cnt / maxWeek) * CHART_H;
                  yOff -= bh;
                  return <rect key={t} x={x} y={yOff} width={BAR_W} height={bh} fill={SC[t]} rx={t===TYPE_ORDER[TYPE_ORDER.findIndex(t2=>wk.counts[t2]>0)]?2:0} />;
                });
                const showLabel = i === 0 || i % 4 === 3 || i === weeklyData.length - 1;
                const wd = new Date(wk.key + 'T00:00:00');
                return (
                  <g key={wk.key}>
                    {rects}
                    {showLabel && <text x={x + BAR_W/2} y={CHART_H + LABEL_H - 2} textAnchor="middle" fontSize={7} fill={SC.muted}>{`${wd.getDate()}/${wd.getMonth()+1}`}</text>}
                  </g>
                );
              })}
            </svg>
          </div>
          <div className="type-legend">
            {donutSegments.filter(s=>s.value>0).map(s => (
              <div key={s.label} className="legend-item">
                <div style={{ width:8,height:8,borderRadius:'50%',background:s.color,flexShrink:0 }} />{s.label}
              </div>
            ))}
          </div>
        </div>

        {/* Activity breakdown donut */}
        <div className="chart-card">
          <div className="chart-card-title">Activity breakdown</div>
          <div style={{ display:'flex', alignItems:'center', gap:20 }}>
            <DonutChart segments={donutSegments} size={110} />
            <div style={{ flex:1 }}>
              {donutSegments.filter(s=>s.value>0).map(s => (
                <div key={s.label} style={{ display:'flex', alignItems:'center', gap:8, marginBottom:7 }}>
                  <div style={{ width:8,height:8,borderRadius:'50%',background:s.color,flexShrink:0 }} />
                  <div style={{ flex:1, fontSize:13, fontWeight:500 }}>{s.label}</div>
                  <div style={{ fontSize:13, color:'var(--text-muted)' }}>{s.value}</div>
                  <div style={{ fontSize:12, color:'var(--text-subtle)' }}>({Math.round(s.value/total*100)}%)</div>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* Top exercises */}
        {topEx.length > 0 && (
          <div className="chart-card">
            <div className="chart-card-title">Top exercises</div>
            <div>
              {topEx.map((e, i) => (
                <div key={e.name} className="ex-rank-item">
                  <div className="ex-rank-n">{i+1}</div>
                  <div className="ex-rank-name">{e.name}</div>
                  <div className="ex-rank-bar"><div className="ex-rank-fill" style={{ width: `${(e.count/topEx[0].count)*100}%` }} /></div>
                  <div className="ex-rank-cnt">{e.count}×</div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    );
  }
